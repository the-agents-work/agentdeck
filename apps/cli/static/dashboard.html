<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#0b0b0c" />
    <title>Pocket Agents</title>
    <style>
      /* ============================================================
         Design tokens — Manus-inspired dark palette
         ============================================================ */
      :root {
        --bg-page: #050506;
        --bg-panel: #0d0d0e;
        --bg-sidebar: #161617;
        --bg-card: #1a1a1c;
        --bg-card-2: #1f1f21;
        --bg-card-hover: #26262a;
        --border-soft: rgba(255, 255, 255, 0.05);
        --border-strong: rgba(255, 255, 255, 0.11);
        --text-main: #f4f4f5;
        --text-muted: #a4a4ab;
        --text-faint: #71717a;

        /* Per-agent palette — assigned to --accent at body scope */
        --claude-accent: #d97757;
        --claude-soft: rgba(217, 119, 87, 0.14);
        --codex-accent: #14b8a6;
        --codex-soft: rgba(20, 184, 166, 0.14);

        --accent: var(--claude-accent);
        --accent-soft: var(--claude-soft);

        --success: #22c55e;
        --warning: #f59e0b;
        --error: #ef4444;

        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 24px;
      }
      body[data-agent="claude"] {
        --accent: var(--claude-accent);
        --accent-soft: var(--claude-soft);
      }
      body[data-agent="codex"] {
        --accent: var(--codex-accent);
        --accent-soft: var(--codex-soft);
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg-page);
        color: var(--text-main);
        font-family:
          -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto,
          sans-serif;
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior: none;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      button {
        background: none;
        border: none;
        color: inherit;
        font: inherit;
        cursor: pointer;
        padding: 0;
      }
      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      textarea {
        background: none;
        border: none;
        color: inherit;
        font: inherit;
        outline: none;
        resize: none;
      }
      input {
        background: none;
        border: none;
        color: inherit;
        font: inherit;
        outline: none;
      }
      pre {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 6px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.16);
      }

      /* ============================================================
         App shell — mobile-first column. On desktop, centered panel.
         ============================================================ */
      #app {
        position: relative;
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 420px;
        height: 100dvh;
        min-height: 0;
        background: var(--bg-panel);
        overflow: hidden;
      }
      /* ============================================================
         Tablet (720px) — keep the "premium phone preview" frame
         but bump the panel a bit and lighten the surrounding void.
         ============================================================ */
      @media (min-width: 720px) and (max-width: 1023px) {
        body {
          background: var(--bg-page);
          padding: 0;
        }
        #app {
          height: min(100dvh, 880px);
          max-height: 100dvh;
          margin: max(0px, calc((100dvh - 880px) / 2)) 0;
          border-radius: 28px;
          border: 1px solid var(--border-soft);
          box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
        }
      }

      /* ============================================================
         Desktop (≥1024px) — full-screen 3-pane workspace.
         Drops the phone-frame look entirely. Sidebar becomes
         persistent on the left, main fills the rest.
         ============================================================ */
      /* Desktop @media block moved to bottom of stylesheet (after all base
         rules) so per-element overrides win specificity. See line ≈1900+. */

      /* Even-wider screen — pad messages so a long chat doesn't stretch
         to readability-breaking line lengths. */
      @media (min-width: 1440px) {
        .messages,
        .input-shell,
        .context-pill-row {
          max-width: 920px;
        }
      }

      /* ============================================================
         Sidebar (always overlay drawer)
         ============================================================ */
      .sidebar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: min(280px, 84vw);
        background: var(--bg-sidebar);
        z-index: 30;
        display: flex;
        flex-direction: column;
        transform: translateX(-100%);
        transition: transform 0.22s cubic-bezier(0.32, 0.72, 0.3, 1);
        will-change: transform;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      .sidebar.open {
        transform: translateX(0);
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.55),
          0 0 0 1px var(--border-soft);
      }
      .backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 20;
        animation: fade-in 0.18s ease;
      }
      @keyframes fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .sidebar-header {
        padding: 18px 18px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sidebar-header h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
        flex: 1;
        color: var(--text-main);
      }
      .sidebar-close {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: var(--text-muted);
      }
      .sidebar-close:hover {
        background: var(--bg-card);
        color: var(--text-main);
      }

      .conn-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text-faint);
      }
      .conn-dot.open {
        background: var(--success);
      }
      .conn-dot.connecting,
      .conn-dot.authing {
        background: var(--warning);
        animation: pulse 1s infinite;
      }
      .conn-dot.closed,
      .conn-dot.auth_failed {
        background: var(--error);
      }
      @keyframes pulse {
        50% {
          opacity: 0.4;
        }
      }

      /* Agent segmented control */
      .agent-picker {
        display: flex;
        gap: 4px;
        margin: 6px 14px 0;
        padding: 4px;
        background: var(--bg-card);
        border-radius: 12px;
      }
      .agent-option {
        flex: 1;
        padding: 8px 10px;
        border-radius: 9px;
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition:
          background 0.15s ease,
          color 0.15s ease;
      }
      .agent-option:hover {
        color: var(--text-main);
      }
      .agent-option .agent-glyph {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .agent-option[data-agent="claude"] .agent-glyph {
        background: var(--claude-accent);
      }
      .agent-option[data-agent="codex"] .agent-glyph {
        background: var(--codex-accent);
      }
      .agent-option.active {
        background: var(--bg-card-hover);
        color: var(--text-main);
      }
      .agent-option.active[data-agent="claude"] {
        color: var(--claude-accent);
      }
      .agent-option.active[data-agent="codex"] {
        color: var(--codex-accent);
      }

      /* New chat — full-width pill */
      .new-chat {
        margin: 12px 14px 6px;
        padding: 12px 14px;
        background: var(--accent);
        color: #0a0a0b;
        border-radius: 12px;
        font-weight: 600;
        font-size: 13.5px;
        text-align: center;
        transition: filter 0.15s ease;
      }
      .new-chat:hover {
        filter: brightness(1.08);
      }

      /* Chat list */
      .sessions {
        flex: 1;
        overflow-y: auto;
        padding: 8px 8px 16px;
      }
      .sessions-label {
        padding: 12px 12px 6px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-faint);
      }
      .session-item {
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        margin: 1px 0;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: background 0.12s ease;
      }
      .session-item:hover {
        background: var(--bg-card);
      }
      .session-item.active {
        background: rgba(255, 255, 255, 0.04);
        box-shadow: inset 0 0 0 1px var(--border-soft);
      }
      .session-title {
        font-size: 13.5px;
        color: var(--text-main);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .session-text {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .session-meta {
        font-size: 11.5px;
        color: var(--text-faint);
        margin-top: 2px;
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-faint);
        flex-shrink: 0;
      }
      .status-dot.running {
        background: var(--warning);
        animation: pulse 1s infinite;
      }
      /* Hover-revealed rename/delete on each session row. On touch devices
         the hover state is never satisfied, so we keep them visible at low
         opacity instead of hiding them entirely. */
      .row-actions {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        margin-left: 4px;
        flex-shrink: 0;
        opacity: 0;
        transition: opacity 0.12s ease;
      }
      .session-item:hover .row-actions,
      .session-item.active .row-actions {
        opacity: 1;
      }
      @media (hover: none) {
        .row-actions {
          opacity: 0.55;
        }
      }
      .row-action {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        font-size: 13px;
        color: var(--text-faint);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.12s ease,
          color 0.12s ease;
      }
      .row-action:hover {
        background: var(--bg-card-hover);
        color: var(--text-main);
      }
      .row-action.danger:hover {
        background: rgba(239, 68, 68, 0.14);
        color: var(--error);
      }
      .status-dot.error {
        background: var(--error);
      }
      .status-dot.done {
        background: var(--success);
      }

      .empty {
        padding: 28px 18px;
        color: var(--text-faint);
        font-size: 13px;
        text-align: center;
        line-height: 1.6;
      }

      /* Agent chip — used in session items and chat header */
      .agent-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 9.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 2px 7px;
        border-radius: 999px;
        flex-shrink: 0;
        opacity: 0.85;
      }
      .agent-chip[data-agent="claude"] {
        background: rgba(217, 119, 87, 0.1);
        color: var(--claude-accent);
      }
      .agent-chip[data-agent="codex"] {
        background: rgba(20, 184, 166, 0.1);
        color: var(--codex-accent);
      }
      .agent-chip .agent-glyph {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: currentColor;
      }

      .sidebar-footer {
        padding: 12px 16px;
        font-size: 11.5px;
        color: var(--text-faint);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .sidebar-footer button {
        color: var(--text-muted);
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 11.5px;
      }
      .sidebar-footer button:hover {
        color: var(--text-main);
        background: var(--bg-card);
      }

      /* ============================================================
         Main area
         ============================================================ */
      .main {
        flex: 1;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .main-header {
        padding: 12px 14px;
        padding-top: max(12px, env(safe-area-inset-top));
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 56px;
        border-bottom: 1px solid var(--border-soft);
        background: var(--bg-panel);
      }
      .menu-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: var(--text-muted);
        transition: background 0.12s ease;
      }
      .menu-btn:hover {
        background: var(--bg-card);
        color: var(--text-main);
      }
      .header-title {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .header-title h2 {
        margin: 0;
        font-size: 14.5px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text-main);
        letter-spacing: -0.005em;
        line-height: 1.25;
      }
      .header-meta {
        font-size: 11px;
        color: var(--text-faint);
        line-height: 1.25;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .main-header .badge {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 3px 8px;
        border-radius: 5px;
        background: var(--bg-card);
        color: var(--text-muted);
        flex-shrink: 0;
      }
      .badge.running {
        background: var(--accent-soft);
        color: var(--accent);
      }

      /* ============================================================
         Empty hero — Manus-style "What can I help you with?"
         ============================================================ */
      .empty-hero {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 22px 32px;
        gap: 12px;
        text-align: center;
        overflow-y: auto;
      }
      /* ============================================================
         Workspace surfaces (card in hero, chip in header, row in sidebar)
         ============================================================ */
      .workspace-card {
        width: 100%;
        max-width: 440px;
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-lg);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: background 0.12s ease, border-color 0.12s ease;
      }
      .workspace-card-connected {
        cursor: pointer;
      }
      .workspace-card-connected:hover {
        background: var(--bg-card-2);
        border-color: var(--border-strong);
      }
      .workspace-card-empty {
        flex-direction: column;
        align-items: stretch;
        text-align: left;
        gap: 10px;
        padding: 18px;
      }
      .ws-card-title {
        font-size: 14.5px;
        font-weight: 600;
        color: var(--text-main);
      }
      .ws-card-sub {
        font-size: 13px;
        line-height: 1.5;
        color: var(--text-muted);
      }
      .ws-connect-btn {
        align-self: flex-start;
        padding: 10px 16px;
        background: var(--accent);
        color: #0a0a0b;
        border-radius: 10px;
        font-weight: 600;
        font-size: 13.5px;
        margin-top: 4px;
        transition: filter 0.12s ease;
      }
      .ws-connect-btn:hover {
        filter: brightness(1.08);
      }
      .ws-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: var(--bg-card-2);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }
      .ws-icon-empty {
        color: var(--text-faint);
        font-size: 20px;
        font-weight: 300;
      }
      .ws-meta {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .ws-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-main);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .ws-name-empty {
        color: var(--text-muted);
        font-weight: 500;
      }
      .ws-path {
        font-size: 11.5px;
        color: var(--text-faint);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .ws-action {
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 500;
        padding: 4px 10px;
        border-radius: 6px;
        flex-shrink: 0;
      }
      .workspace-card-connected:hover .ws-action {
        color: var(--accent);
        background: var(--accent-soft);
      }

      /* Sidebar workspace row (compact) */
      .workspace-row {
        margin: 0 12px 4px;
        padding: 10px 12px;
        border-radius: 10px;
        background: var(--bg-card);
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition: background 0.12s ease;
      }
      .workspace-row:hover {
        background: var(--bg-card-hover);
      }
      .workspace-row .ws-icon {
        width: 28px;
        height: 28px;
        font-size: 14px;
        border-radius: 8px;
      }

      /* Header workspace chip (subtle, click → picker) */
      .ws-chip {
        font-size: 12px;
        font-weight: 600;
        padding: 5px 10px;
        border-radius: 999px;
        background: var(--bg-card);
        color: var(--text-muted);
        border: 1px solid var(--border-soft);
        max-width: 140px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex-shrink: 0;
        transition: background 0.12s ease, color 0.12s ease;
      }
      .ws-chip:hover {
        background: var(--bg-card-hover);
        color: var(--text-main);
      }

      /* Context pill above composer in active chat */
      .context-pill-row {
        padding: 4px 14px 0;
        display: flex;
        justify-content: center;
      }

      /* Connection-lost banner. Shown when WS is "closed" or "auth_failed"
         for more than a couple seconds — tunnel URLs change on every CLI
         restart, so the most common cause is a stale URL in this tab. */
      .conn-banner {
        background: rgba(239, 68, 68, 0.12);
        color: #fca5a5;
        border-bottom: 1px solid rgba(239, 68, 68, 0.25);
        padding: 10px 16px;
        font-size: 13px;
        text-align: center;
        line-height: 1.4;
      }
      .conn-banner code {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        background: rgba(255, 255, 255, 0.08);
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 12px;
      }
      .context-pill {
        font-size: 11.5px;
        color: var(--text-faint);
        padding: 3px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
      }

      .hero-composer.disabled {
        opacity: 0.5;
      }

      .empty-hero h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: var(--text-main);
        max-width: 14ch;
      }
      .empty-hero .hero-sub {
        margin: 0 0 14px;
        color: var(--text-muted);
        font-size: 14.5px;
        max-width: 28ch;
      }
      .hero-composer {
        width: 100%;
        max-width: 440px;
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 22px;
        padding: 8px 10px;
        display: flex;
        align-items: flex-end;
        gap: 6px;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }
      .hero-composer:focus-within {
        border-color: var(--accent);
        background: var(--bg-card-2);
      }
      .hero-composer textarea {
        flex: 1;
        min-height: 28px;
        max-height: 180px;
        padding: 6px 0;
        font-size: 15px;
        color: var(--text-main);
      }
      .hero-composer textarea::placeholder {
        color: var(--text-faint);
      }
      .suggestions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin-top: 8px;
        max-width: 440px;
      }
      .pill {
        background: var(--bg-card);
        color: var(--text-muted);
        font-size: 12.5px;
        font-weight: 500;
        padding: 8px 14px;
        border-radius: 999px;
        transition:
          background 0.12s ease,
          color 0.12s ease;
        white-space: nowrap;
      }
      .pill:hover {
        background: var(--bg-card-hover);
        color: var(--text-main);
      }
      .pill[data-agent="claude"]:hover {
        background: var(--claude-soft);
        color: var(--claude-accent);
      }
      .pill[data-agent="codex"]:hover {
        background: var(--codex-soft);
        color: var(--codex-accent);
      }

      /* ============================================================
         Messages
         ============================================================ */
      .messages {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 16px 14px 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .msg-row {
        display: flex;
        max-width: 100%;
      }
      .msg-row.user {
        justify-content: flex-end;
      }
      .msg-row.assistant {
        justify-content: flex-start;
      }
      .msg-row.system {
        justify-content: center;
      }
      .bubble {
        max-width: 86%;
        padding: 12px 16px;
        border-radius: 18px;
        line-height: 1.6;
        word-break: break-word;
      }
      .bubble.user {
        background: var(--accent-soft);
        color: var(--text-main);
        border-bottom-right-radius: 8px;
        padding: 10px 14px;
      }
      .bubble.assistant {
        background: transparent;
        border: none;
        padding: 4px 2px;
        max-width: 100%;
        color: var(--text-main);
        line-height: 1.65;
      }
      .bubble.user pre {
        font-family: inherit;
        font-size: 14.5px;
      }
      .bubble.assistant pre {
        font-size: 14px;
      }

      /* Markdown rendering inside assistant bubble */
      .md > *:first-child {
        margin-top: 0;
      }
      .md > *:last-child {
        margin-bottom: 0;
      }
      .md p {
        margin: 0.5em 0;
      }
      .md h1,
      .md h2,
      .md h3,
      .md h4 {
        margin: 0.8em 0 0.4em;
        font-weight: 600;
        line-height: 1.3;
        letter-spacing: -0.01em;
      }
      .md h1 {
        font-size: 1.35em;
      }
      .md h2 {
        font-size: 1.2em;
      }
      .md h3 {
        font-size: 1.08em;
      }
      .md ul,
      .md ol {
        margin: 0.4em 0;
        padding-left: 1.3em;
      }
      .md li {
        margin: 0.25em 0;
      }
      .md code {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 0.9em;
        background: rgba(255, 255, 255, 0.08);
        padding: 1.5px 6px;
        border-radius: 5px;
      }
      .md pre {
        background: #0d0d0e;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        padding: 10px 12px;
        overflow-x: auto;
        font-size: 12.5px;
        line-height: 1.55;
        margin: 0.6em 0;
        max-width: 100%;
      }
      .md pre code {
        background: none;
        padding: 0;
        font-size: inherit;
        border-radius: 0;
      }
      .md blockquote {
        border-left: 3px solid var(--border-strong);
        margin: 0.5em 0;
        padding: 0 0 0 12px;
        color: var(--text-muted);
      }
      .md a {
        color: var(--accent);
        text-decoration: underline;
      }
      .md table {
        border-collapse: collapse;
        margin: 0.5em 0;
        display: block;
        overflow-x: auto;
        max-width: 100%;
      }
      .md th,
      .md td {
        border: 1px solid var(--border-soft);
        padding: 5px 9px;
        font-size: 12.5px;
        text-align: left;
      }
      .md th {
        background: rgba(255, 255, 255, 0.03);
      }
      .md hr {
        border: none;
        border-top: 1px solid var(--border-soft);
        margin: 0.9em 0;
      }

      /* Thinking blocks */
      .thinking {
        max-width: 96%;
        background: transparent;
        border: 1px dashed var(--border-strong);
        border-radius: 14px;
        padding: 10px 14px;
        color: var(--text-muted);
        font-size: 13px;
        line-height: 1.55;
      }
      .thinking-header {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-faint);
        cursor: pointer;
        user-select: none;
      }
      .thinking-header::before {
        content: "▸";
        display: inline-block;
        font-size: 10px;
        transition: transform 0.15s ease;
        color: var(--text-faint);
      }
      .thinking.open .thinking-header::before {
        transform: rotate(90deg);
      }
      .thinking-body {
        margin-top: 8px;
        font-style: italic;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .thinking:not(.open) .thinking-body {
        display: none;
      }
      .thinking-body pre {
        font-family: inherit;
        font-size: 13px;
      }

      /* Tool cards */
      .tool-card {
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        padding: 10px 12px;
        max-width: 96%;
      }
      .tool-card.error {
        border-color: rgba(239, 68, 68, 0.3);
      }
      .tool-label {
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--accent);
        margin-bottom: 6px;
      }
      .tool-card.error .tool-label {
        color: var(--error);
      }
      .tool-body {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 12px;
        line-height: 1.55;
        max-height: 260px;
        overflow-y: auto;
        color: var(--text-main);
      }

      .sys-msg {
        font-size: 11.5px;
        color: var(--text-faint);
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--bg-card);
      }
      .hook-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 10.5px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 3px 9px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-faint);
      }
      .hook-chip::before {
        content: "⚡";
        font-size: 11px;
      }

      /* ============================================================
         Composer (bottom)
         ============================================================ */
      .input-bar {
        padding: 12px 14px;
        padding-bottom: max(14px, env(safe-area-inset-bottom));
        /* Gradient + blur so the composer feels like it's floating over the
           chat thread instead of welded to a hard edge. The fallback solid
           color is for Firefox/older Safari where backdrop-filter is off. */
        background: linear-gradient(
          to top,
          color-mix(in srgb, var(--bg-panel) 96%, transparent),
          color-mix(in srgb, var(--bg-panel) 72%, transparent)
        );
        background-color: var(--bg-panel);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid var(--border-soft);
      }
      .input-shell {
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 22px;
        padding: 8px 10px 8px 10px;
        display: flex;
        align-items: flex-end;
        gap: 6px;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }
      .input-action {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--text-faint);
        font-size: 18px;
        flex-shrink: 0;
        transition:
          background 0.12s ease,
          color 0.12s ease;
      }
      .input-action:hover {
        background: var(--bg-card-hover);
        color: var(--text-main);
      }
      .input-shell:focus-within {
        border-color: var(--accent);
        background: var(--bg-card-2);
      }
      .input-shell textarea {
        flex: 1;
        min-height: 26px;
        max-height: 180px;
        padding: 5px 0;
        font-size: 15px;
        color: var(--text-main);
      }
      .input-shell textarea::placeholder {
        color: var(--text-faint);
      }
      .send-btn {
        background: var(--accent);
        color: #0a0a0b;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 17px;
        font-weight: 700;
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: filter 0.12s ease;
      }
      .send-btn:hover:not(:disabled) {
        filter: brightness(1.08);
      }
      .send-btn:disabled {
        background: var(--bg-card-hover);
        color: var(--text-faint);
        cursor: not-allowed;
      }
      .stop-btn {
        color: var(--error);
        font-weight: 600;
        padding: 6px 12px;
        font-size: 13px;
        border-radius: 8px;
      }
      .stop-btn:hover {
        background: rgba(239, 68, 68, 0.1);
      }

      .status-bar {
        padding: 8px 16px;
        font-size: 12px;
        color: var(--accent);
        background: var(--accent-soft);
        border-top: 1px solid var(--border-soft);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .status-bar-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      /* Monospaced elapsed-time chip — fixed-width digits stop the row
         jittering as seconds roll over (1s → 12s → 1m 04s). */
      .status-bar-time {
        font-variant-numeric: tabular-nums;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 11.5px;
        padding: 1px 7px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--accent);
      }

      /* ============================================================
         Project picker modal (opens before session.create)
         ============================================================ */
      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        z-index: 50;
        display: flex;
        align-items: flex-end;
        animation: fade-in 0.18s ease;
      }
      .modal {
        width: 100%;
        max-height: 86%;
        background: var(--bg-sidebar);
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
        padding: 18px 16px;
        padding-bottom: max(18px, env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        gap: 12px;
        animation: slide-up 0.22s cubic-bezier(0.32, 0.72, 0.3, 1);
      }
      @keyframes slide-up {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .modal-grabber {
        width: 38px;
        height: 4px;
        border-radius: 999px;
        background: var(--text-faint);
        margin: -6px auto 4px;
        opacity: 0.5;
      }
      .modal h3 {
        margin: 0;
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .modal-sub {
        color: var(--text-muted);
        font-size: 13px;
        margin: -8px 0 4px;
      }
      .modal-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        margin: 0 -16px;
        padding: 0 16px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .project-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 12px;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.12s ease;
      }
      .project-row:hover {
        background: var(--bg-card);
      }
      .project-icon {
        width: 32px;
        height: 32px;
        border-radius: 9px;
        background: var(--bg-card);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        flex-shrink: 0;
      }
      .project-meta {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .project-name {
        font-size: 14px;
        font-weight: 500;
        color: var(--text-main);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .project-path {
        font-size: 11.5px;
        color: var(--text-faint);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .project-actions {
        display: inline-flex;
        gap: 4px;
        opacity: 0;
        transition: opacity 0.12s ease;
      }
      .project-row:hover .project-actions,
      .project-row:focus-within .project-actions {
        opacity: 1;
      }
      .project-action {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--text-faint);
        font-size: 13px;
      }
      .project-action:hover {
        background: var(--bg-card-hover);
        color: var(--text-main);
      }
      .project-action.pinned {
        color: var(--accent);
      }
      .git-dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        margin-left: 6px;
        vertical-align: middle;
        opacity: 0.8;
      }
      .section-label {
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-faint);
        padding: 14px 12px 4px;
      }
      .modal-custom {
        display: flex;
        gap: 6px;
        padding: 8px 12px 4px;
      }
      .modal-custom input {
        flex: 1;
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        color: var(--text-main);
      }
      .modal-custom input:focus {
        border-color: var(--accent);
      }
      .modal-custom button {
        padding: 0 16px;
        background: var(--accent);
        color: #0a0a0b;
        border-radius: 10px;
        font-weight: 600;
        font-size: 13px;
      }
      .modal-custom button:disabled {
        background: var(--bg-card-hover);
        color: var(--text-faint);
      }
      .modal-error {
        color: var(--error);
        font-size: 12.5px;
        padding: 4px 12px 0;
      }
      .modal-footer {
        display: flex;
        justify-content: flex-end;
        padding-top: 4px;
      }
      .modal-footer button {
        padding: 8px 14px;
        font-size: 13px;
        color: var(--text-muted);
        border-radius: 8px;
      }
      .modal-footer button:hover {
        background: var(--bg-card);
        color: var(--text-main);
      }

      /* ============================================================
         Desktop (≥1024px) — full-screen 3-pane workspace.
         Placed at the END of the stylesheet so per-element overrides win
         specificity over the mobile-first base rules above.
         ============================================================ */
      @media (min-width: 1024px) {
        html,
        body {
          height: 100dvh;
        }
        body {
          background: var(--bg-page);
          align-items: stretch;
          padding: 0;
        }
        #app {
          flex-direction: row;
          width: 100vw;
          max-width: none;
          height: 100dvh;
          max-height: none;
          margin: 0;
          border: none;
          border-radius: 0;
          box-shadow: none;
        }
        /* Sidebar: persistent, no transform-based drawer animation. */
        .sidebar {
          position: relative;
          transform: none;
          width: 280px;
          flex-shrink: 0;
          border-right: 1px solid var(--border-soft);
          box-shadow: none;
          padding-top: 0;
        }
        /* Hide drawer-specific affordances on desktop. */
        .sidebar-close,
        .menu-btn,
        .backdrop {
          display: none;
        }
        /* Main fills remaining space. */
        .main {
          flex: 1;
          min-width: 0;
          background: var(--bg-page);
        }
        .main-header {
          padding: 18px 32px;
          background: transparent;
          border-bottom: none;
          min-height: 64px;
        }
        .main-header h2 {
          font-size: 15.5px;
        }
        /* Hero: full breathing room, bigger headline, wider composer. */
        .empty-hero {
          justify-content: center;
          padding: 40px 32px 56px;
          gap: 18px;
        }
        .empty-hero h1 {
          font-size: 42px;
          max-width: 20ch;
        }
        .hero-sub {
          font-size: 16px;
        }
        .workspace-card {
          max-width: 640px;
        }
        .hero-composer {
          max-width: 720px;
          padding: 14px 14px 14px 18px;
        }
        .hero-composer textarea {
          font-size: 16px;
        }
        .suggestions {
          max-width: 720px;
          gap: 10px;
          margin-top: 14px;
        }
        .pill {
          font-size: 13.5px;
          padding: 10px 18px;
        }
        /* Bottom composer in active chat — also wider, centered. */
        .input-bar {
          padding: 16px 32px;
        }
        .input-shell {
          max-width: 880px;
          margin: 0 auto;
        }
        .messages {
          padding: 24px 32px 32px;
          max-width: 880px;
          margin: 0 auto;
          width: 100%;
        }
        .bubble {
          max-width: 78%;
        }
        .bubble.assistant {
          max-width: 100%;
        }
        .context-pill-row {
          max-width: 880px;
          margin: 0 auto;
        }
        /* Status bar (Claude is working… + elapsed) — keep it on the same
           880px axis as messages/composer so the "Stop" affordance sits
           exactly above the send button. */
        .status-bar {
          max-width: 880px;
          margin: 0 auto;
          width: 100%;
          padding: 10px 32px;
          font-size: 12.5px;
          border-radius: 12px 12px 0 0;
        }
        /* Workspace chip in header — slightly bigger, easier click target. */
        .ws-chip {
          font-size: 13px;
          padding: 7px 14px;
          max-width: 220px;
        }
        /* Picker modal: centered, narrower (sidebar already covers most
           folder needs). */
        .modal-backdrop {
          position: fixed;
          align-items: center;
          justify-content: center;
        }
        .modal {
          width: 520px;
          max-width: 90vw;
          max-height: 80vh;
          border-radius: 18px;
          padding: 22px 18px 18px;
          gap: 14px;
        }
        .modal-grabber {
          display: none;
        }
      }

      /* ============================================================
         PIN gate
         ============================================================ */
      .pin-screen {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 32px 24px;
        text-align: center;
      }
      .pin-screen h2 {
        margin: 0;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: -0.01em;
      }
      .pin-screen p {
        color: var(--text-muted);
        margin: 0;
        max-width: 32ch;
        font-size: 14px;
      }
      .pin-input {
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 14px;
        padding: 16px 20px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 22px;
        letter-spacing: 0.45em;
        text-align: center;
        width: 220px;
        color: var(--text-main);
        margin-top: 6px;
      }
      .pin-input:focus {
        border-color: var(--accent);
      }
      .pin-input.error {
        border-color: var(--error);
        animation: shake 0.25s;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-6px);
        }
        75% {
          transform: translateX(6px);
        }
      }
      .pin-error {
        color: var(--error);
        font-size: 13px;
        min-height: 18px;
      }
      .pin-screen button[data-primary] {
        padding: 12px 28px;
        background: var(--accent);
        color: #0a0a0b;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
      }
      .pin-screen button[data-primary]:disabled {
        background: var(--bg-card-hover);
        color: var(--text-faint);
        cursor: not-allowed;
      }
      .pin-screen button[data-secondary] {
        color: var(--text-faint);
        font-size: 13px;
        margin-top: 4px;
        padding: 6px 12px;
        border-radius: 8px;
      }
      .pin-screen button[data-secondary]:hover {
        color: var(--text-muted);
      }

      /* ============================================================
         Pair screen
         ============================================================ */
      .pair-screen {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        flex-direction: column;
        gap: 14px;
        text-align: center;
      }
      .pair-screen h2 {
        margin: 0;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: -0.01em;
      }
      .pair-screen p {
        color: var(--text-muted);
        margin: 0;
        max-width: 32ch;
        font-size: 14px;
      }
      .pair-screen input {
        padding: 12px 14px;
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        font-family: ui-monospace, monospace;
        font-size: 12.5px;
        width: 100%;
        max-width: 320px;
        color: var(--text-main);
        margin-top: 8px;
      }
      .pair-screen input:focus {
        border-color: var(--accent);
      }
      .pair-screen button {
        padding: 12px 28px;
        background: var(--accent);
        color: #0a0a0b;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { h, render } from "https://esm.sh/preact@10.27.0";
      import {
        useState,
        useEffect,
        useRef,
        useMemo,
      } from "https://esm.sh/preact@10.27.0/hooks";
      import htm from "https://esm.sh/htm@3.1.1";
      import { marked } from "https://esm.sh/marked@14.1.4";
      import DOMPurify from "https://esm.sh/dompurify@3.2.4";

      const html = htm.bind(h);

      // Configure marked: GFM (tables, fenced code), line breaks → <br>, no auto-link
      // of bare URLs (agents often include URLs in prose; we don't need every URL
      // becoming a target=_blank surface).
      marked.setOptions({ gfm: true, breaks: true });

      // Render markdown → sanitized HTML. We feed the result to dangerouslySetInnerHTML.
      // DOMPurify strips <script>, on* handlers, javascript: URLs, etc., so even a
      // pathological agent response can't xss the dashboard.
      function renderMarkdown(text) {
        if (typeof text !== "string" || text.length === 0) return "";
        const raw = marked.parse(text);
        return DOMPurify.sanitize(raw, {
          USE_PROFILES: { html: true },
          ADD_ATTR: ["target", "rel"],
        });
      }
      const PROTOCOL_VERSION = 1;
      const TOKEN_KEY = "pocket-agents:token:v1";
      const ACTIVE_WORKSPACE_KEY = "pocket-agents:active-workspace:v1";

      /**
       * Active workspace = which local folder Claude / Codex will operate on
       * for the NEXT new chat. This is intentionally a top-level concept in
       * the UI (not a settings tweak) — the agent without a workspace is
       * useless for code work.
       *
       * Persisted as a `{ name, path }` shape (not the full Project object)
       * so a stale localStorage value can still be displayed if the server's
       * projects.json has been edited or wiped — we just lose the pinned/
       * addedAt metadata, which is fine.
       */
      function loadActiveWorkspace() {
        try {
          const raw = localStorage.getItem(ACTIVE_WORKSPACE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed?.path) return null;
          return { name: parsed.name || basenameOf(parsed.path), path: parsed.path };
        } catch {
          return null;
        }
      }
      function saveActiveWorkspace(ws) {
        if (!ws) localStorage.removeItem(ACTIVE_WORKSPACE_KEY);
        else
          localStorage.setItem(
            ACTIVE_WORKSPACE_KEY,
            JSON.stringify({ name: ws.name, path: ws.path }),
          );
      }
      function basenameOf(p) {
        if (!p) return "";
        // Bare home dir → "Home" so the workspace label stays stable whether
        // the user picked "Home" (cwd: "") or has an existing chat whose
        // DB-stored cwd is the resolved /Users/<them> path.
        if (/^\/Users\/[^/]+\/?$/.test(p) || /^\/home\/[^/]+\/?$/.test(p)) {
          return "Home";
        }
        const parts = String(p).split("/").filter(Boolean);
        return parts[parts.length - 1] ?? p;
      }
      function shortenPath(p) {
        if (!p) return "";
        // Collapse /Users/<me> to ~ so common paths read shorter on mobile.
        const m = String(p).match(/^\/Users\/[^/]+/);
        if (m) return "~" + p.slice(m[0].length);
        return p;
      }

      /* ──────────── Token & WS handling ──────────── */

      function readToken() {
        const url = new URL(window.location.href);
        const fromQuery = url.searchParams.get("t");
        if (fromQuery) {
          localStorage.setItem(TOKEN_KEY, fromQuery);
          // Strip token from URL so it doesn't sit in browser history
          url.searchParams.delete("t");
          window.history.replaceState({}, "", url.toString());
          return fromQuery;
        }
        return localStorage.getItem(TOKEN_KEY);
      }

      function clearToken() {
        localStorage.removeItem(TOKEN_KEY);
      }

      function wsUrl() {
        const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
        return `${proto}//${window.location.host}/ws`;
      }

      /* ──────────── Time helpers ──────────── */
      function timeAgo(ts) {
        const sec = Math.floor((Date.now() - ts) / 1000);
        if (sec < 60) return `${sec}s`;
        if (sec < 3600) return `${Math.floor(sec / 60)}m`;
        if (sec < 86400) return `${Math.floor(sec / 3600)}h`;
        return `${Math.floor(sec / 86400)}d`;
      }
      function prettyJson(v) {
        try {
          return JSON.stringify(v, null, 2);
        } catch {
          return String(v);
        }
      }
      function agentLabel(agent) {
        return agent === "codex" ? "Codex" : "Claude";
      }

      /**
       * Strip the "· timestamp" suffix the server appends to default session
       * titles. We don't touch the DB (no backend change), we just render a
       * cleaner version. Custom user-provided titles pass through unchanged.
       */
      function prettyTitle(session) {
        if (!session) return "Chat";
        const raw = session.title || "";
        // Default title shape: "New chat · 5/26/2026, 11:29:28 AM"
        if (/^New chat · /.test(raw)) {
          return `New ${agentLabel(session.agent)} chat`;
        }
        return raw;
      }

      /** Friendly working-dir label for the chat header: project name if cwd
       *  matches a saved project, else folder basename, else null. */
      function projectLabelFor(session, projects) {
        const cwd = session?.cwd;
        if (!cwd) return null;
        const match = projects?.find((p) => p.path === cwd);
        if (match) return match.name;
        // Fallback: basenameOf handles the bare-home-dir special case so a
        // session that was picked via the "Home" Quick row shows up as
        // "Home" rather than the user's macOS username.
        return basenameOf(cwd) || null;
      }

      /** "Today, 11:29 AM" / "Yesterday, 6:14 PM" / "May 24, 11:00 AM". */
      function friendlyTime(ts) {
        const d = new Date(ts);
        const now = new Date();
        const sameDay = d.toDateString() === now.toDateString();
        const yesterday = new Date(now);
        yesterday.setDate(now.getDate() - 1);
        const isYesterday = d.toDateString() === yesterday.toDateString();
        const time = d.toLocaleTimeString(undefined, {
          hour: "numeric",
          minute: "2-digit",
        });
        if (sameDay) return `Today, ${time}`;
        if (isYesterday) return `Yesterday, ${time}`;
        return `${d.toLocaleDateString(undefined, { month: "short", day: "numeric" })}, ${time}`;
      }
      function agentTagline(agent) {
        return agent === "codex"
          ? "Codex CLI — OpenAI's code agent."
          : "Claude Code — Anthropic's code agent.";
      }

      /** Compact elapsed-time formatter: 7s · 1m 12s · 5m 8s · 1h 04m 30s. */
      function formatDuration(ms) {
        if (!ms || ms < 0) return "0s";
        const s = Math.floor(ms / 1000);
        if (s < 60) return `${s}s`;
        const m = Math.floor(s / 60);
        const rs = s % 60;
        if (m < 60) return `${m}m ${String(rs).padStart(2, "0")}s`;
        const h = Math.floor(m / 60);
        const rm = m % 60;
        return `${h}h ${String(rm).padStart(2, "0")}m ${String(rs).padStart(2, "0")}s`;
      }

      /** Returns Date.now(), re-rendering every `intervalMs` while active.
       *  Used by the status bar to drive the elapsed-time counter without
       *  pulling in a global setInterval that ticks even when no run exists. */
      function useNow(active, intervalMs = 1000) {
        const [now, setNow] = useState(() => Date.now());
        useEffect(() => {
          if (!active) return;
          setNow(Date.now());
          const id = setInterval(() => setNow(Date.now()), intervalMs);
          return () => clearInterval(id);
        }, [active, intervalMs]);
        return now;
      }

      /* Apply the agent's accent color to <body> so all `var(--accent)` rules
         re-theme without touching individual components. */
      function applyAgentTheme(agent) {
        document.body.dataset.agent = agent === "codex" ? "codex" : "claude";
      }
      applyAgentTheme("claude"); // sensible default before first render

      /* ──────────── Components ──────────── */

      function App() {
        const [token, setToken] = useState(readToken());
        const [wsState, setWsState] = useState("idle");
        const [wsError, setWsError] = useState(null);
        const [sessions, setSessions] = useState([]);
        const [activeId, setActiveId] = useState(null);
        const [chat, setChat] = useState(null); // { sessionId, messages, status }
        const [sidebarOpen, setSidebarOpen] = useState(false);
        const [availableAgents, setAvailableAgents] = useState(["claude"]);
        const [selectedAgent, setSelectedAgent] = useState("claude");
        const [pinState, setPinState] = useState("none"); // 'none' | 'required' | 'verifying' | 'ok' | 'wrong'
        const [pinError, setPinError] = useState(null);
        const [pinAttemptsLeft, setPinAttemptsLeft] = useState(null);
        const [projects, setProjects] = useState([]);
        const [projectsError, setProjectsError] = useState(null);
        const [discovered, setDiscovered] = useState([]);
        // Tracks whether the FIRST session.list reply has arrived. Without
        // this the sidebar briefly flashes "No chats yet" before the WS
        // round-trip completes — looks like a bug even when nothing is wrong.
        const [sessionsLoaded, setSessionsLoaded] = useState(false);
        // The folder the agent will operate on for new chats. Persisted in
        // localStorage so the user keeps their context across page reloads.
        // null = no workspace connected → empty hero shows the Connect CTA.
        const [activeWorkspace, setActiveWorkspaceState] = useState(
          loadActiveWorkspace(),
        );
        function setActiveWorkspace(ws) {
          setActiveWorkspaceState(ws);
          saveActiveWorkspace(ws);
        }
        // Picker holds an in-flight intent: when set, the modal is open and
        // whatever folder the user picks gets paired with .prompt (if any)
        // before firing session.create.
        // intent: 'connect' | 'change' | 'start' — purely informational for
        // the modal title; the resulting action is the same (set workspace +
        // optionally start a chat).
        const [picker, setPicker] = useState(null); // null | { agent, prompt?, intent? }

        const wsRef = useRef(null);

        // Keep <body data-agent="..."> in sync with the active chat's agent
        // (falls back to the currently-selected agent in the picker). This is
        // what swaps the entire UI to Claude orange vs Codex green.
        useEffect(() => {
          const chatAgent = sessions.find((s) => s.id === activeId)?.agent;
          applyAgentTheme(chatAgent ?? selectedAgent);
        }, [activeId, sessions, selectedAgent]);

        function send(cmd) {
          const ws = wsRef.current;
          if (ws && ws.readyState === WebSocket.OPEN)
            ws.send(JSON.stringify(cmd));
        }

        useEffect(() => {
          if (!token) return;
          let socket;
          let reconnectTimer;
          let alive = true;

          function connect() {
            setWsState("connecting");
            setWsError(null);
            socket = new WebSocket(wsUrl());
            wsRef.current = socket;

            socket.onopen = () => {
              setWsState("authing");
              socket.send(
                JSON.stringify({
                  type: "auth",
                  token,
                  protocolVersion: PROTOCOL_VERSION,
                }),
              );
            };
            socket.onmessage = (ev) => {
              let evt;
              try {
                evt = JSON.parse(ev.data);
              } catch {
                return;
              }
              handleEvent(evt);
            };
            socket.onerror = () => {
              setWsError("connection error");
            };
            socket.onclose = () => {
              if (!alive) return;
              setWsState("closed");
              reconnectTimer = setTimeout(connect, 1500);
            };
          }

          function handleEvent(evt) {
            switch (evt.type) {
              case "auth.ok":
                setWsState("open");
                setWsError(null);
                if (Array.isArray(evt.agent) && evt.agent.length) {
                  setAvailableAgents(evt.agent);
                  setSelectedAgent((current) =>
                    evt.agent.includes(current) ? current : evt.agent[0],
                  );
                }
                if (evt.pinRequired) {
                  setPinState("required");
                  setPinError(null);
                  // Don't request session.list yet — it would be rejected by
                  // the PIN gate. We'll list after pin.ok arrives.
                } else {
                  setPinState("none");
                  send({ type: "session.list" });
                  send({ type: "projects.list" });
                }
                break;
              case "auth.fail":
                setWsState("auth_failed");
                setWsError(evt.reason);
                // Bad token — wipe it so user re-pairs
                clearToken();
                setTimeout(() => setToken(null), 400);
                break;
              case "pin.ok":
                setPinState("ok");
                setPinError(null);
                setPinAttemptsLeft(null);
                send({ type: "session.list" });
                send({ type: "projects.list" });
                break;
              case "pin.fail":
                setPinState("wrong");
                setPinError(evt.reason);
                setPinAttemptsLeft(evt.attemptsRemaining);
                break;
              case "session.list":
                setSessions(evt.sessions);
                setSessionsLoaded(true);
                break;
              case "session.updated":
                setSessions((prev) =>
                  prev.map((s) => (s.id === evt.session.id ? evt.session : s)),
                );
                break;
              case "session.created":
                setSessions((prev) => [
                  evt.session,
                  ...prev.filter((s) => s.id !== evt.session.id),
                ]);
                setActiveId(evt.session.id);
                setChat({
                  sessionId: evt.session.id,
                  messages: [],
                  status: "idle",
                  runStartedAt: null,
                  lastDurationMs: null,
                });
                setSidebarOpen(false);
                // Auto-fire a pending prompt queued by the hero composer.
                if (pendingPromptRef.current) {
                  const text = pendingPromptRef.current;
                  pendingPromptRef.current = null;
                  send({
                    type: "prompt",
                    sessionId: evt.session.id,
                    text,
                  });
                }
                break;
              case "session.history":
                setChat({
                  sessionId: evt.sessionId,
                  messages: evt.messages,
                  status: evt.status,
                  // We don't have the original startedAt over the wire (the
                  // server only emits durationMs at completion), so the timer
                  // starts ticking from "now" when we land on an already-
                  // running session. Good enough — it just shows "since you
                  // opened this tab" rather than absolute run time.
                  runStartedAt: evt.status === "running" ? Date.now() : null,
                  lastDurationMs: null,
                });
                break;
              case "session.deleted":
                setSessions((prev) =>
                  prev.filter((s) => s.id !== evt.sessionId),
                );
                if (activeId === evt.sessionId) {
                  setActiveId(null);
                  setChat(null);
                }
                break;
              case "agent.message":
                setChat((prev) => {
                  if (!prev || prev.sessionId !== evt.sessionId) return prev;
                  return { ...prev, messages: [...prev.messages, evt.message] };
                });
                setSessions((prev) => {
                  const next = prev.map((s) =>
                    s.id === evt.sessionId
                      ? {
                          ...s,
                          lastMessageAt: Date.now(),
                          messageCount: s.messageCount + 1,
                        }
                      : s,
                  );
                  next.sort((a, b) => b.lastMessageAt - a.lastMessageAt);
                  return next;
                });
                break;
              case "agent.status":
                setChat((prev) => {
                  if (!prev || prev.sessionId !== evt.sessionId) return prev;
                  // Track when this run started so we can render an
                  // elapsed-time counter, and remember the final durationMs
                  // emitted by the server so the chip survives reloads.
                  const runStartedAt =
                    evt.status === "running" && prev.status !== "running"
                      ? Date.now()
                      : evt.status === "running"
                        ? (prev.runStartedAt ?? Date.now())
                        : null;
                  const lastDurationMs =
                    typeof evt.durationMs === "number"
                      ? evt.durationMs
                      : prev.lastDurationMs ?? null;
                  return { ...prev, status: evt.status, runStartedAt, lastDurationMs };
                });
                setSessions((prev) =>
                  prev.map((s) =>
                    s.id === evt.sessionId ? { ...s, status: evt.status } : s,
                  ),
                );
                break;
              case "agent.error":
                setWsError(evt.error);
                break;
              case "projects.list":
                setProjects(evt.projects);
                setProjectsError(null);
                break;
              case "projects.error":
                setProjectsError(evt.reason);
                break;
              case "fs.scan":
                setDiscovered(evt.folders ?? []);
                break;
            }
          }

          connect();
          return () => {
            alive = false;
            clearTimeout(reconnectTimer);
            try {
              socket && socket.close();
            } catch {}
            wsRef.current = null;
          };
        }, [token]);

        if (!token)
          return html`<${PairScreen}
            onPair=${(t) => {
              localStorage.setItem(TOKEN_KEY, t);
              setToken(t);
            }}
          />`;

        // PIN gate: opens AFTER token auth succeeds, BEFORE the sidebar/main UI.
        // Reuses the same WS — we just don't render the app until pin.ok arrives.
        if (pinState === "required" || pinState === "wrong" || pinState === "verifying") {
          return html`<${PinScreen}
            error=${pinError}
            attemptsLeft=${pinAttemptsLeft}
            busy=${pinState === "verifying"}
            onSubmit=${(p) => {
              setPinState("verifying");
              setPinError(null);
              send({ type: "pin.verify", pin: p });
            }}
            onUnpair=${() => {
              clearToken();
              setToken(null);
            }}
          />`;
        }

        // Holds a prompt that should be auto-sent the moment a fresh session
        // is created server-side. Used by the empty-hero composer so the user
        // can "type-then-send" without the two-step (create → then type) UX.
        const pendingPromptRef = useRef(null);

        // Start a fresh chat in the currently-active workspace. If no
        // workspace is connected, fall through to the picker so the user
        // can choose one as part of the same gesture.
        function createSession() {
          if (!activeWorkspace) {
            setPicker({ agent: selectedAgent, intent: "connect" });
            send({ type: "fs.scan" });
            return;
          }
          pendingPromptRef.current = null;
          send({
            type: "session.create",
            agent: selectedAgent,
            cwd: activeWorkspace.path,
          });
        }
        function startNewWithPrompt(agent, prompt) {
          setSelectedAgent(agent);
          if (!activeWorkspace) {
            setPicker({ agent, prompt, intent: "connect" });
            send({ type: "fs.scan" });
            return;
          }
          pendingPromptRef.current = prompt;
          send({
            type: "session.create",
            agent,
            cwd: activeWorkspace.path,
          });
        }
        // Open the picker explicitly (header chip, sidebar "Connect folder",
        // workspace card "Change" button). Does NOT auto-start a chat.
        // Intent affects modal copy: "Connect a folder" first time vs
        // "Switch workspace" when there's already one connected.
        function openWorkspacePicker() {
          setPicker({
            agent: selectedAgent,
            intent: activeWorkspace ? "change" : "connect",
          });
          // Refresh discovered folders every time the picker opens — fast
          // enough (~50ms server-side) and folders/repos change as the user
          // works on their laptop.
          send({ type: "fs.scan" });
        }
        // Called by the modal when the user picks a folder. Both updates the
        // active workspace (so future "+ New chat" defaults to it) AND, if
        // there's a pending prompt or the user clicked through "start a chat",
        // immediately spawns the session.
        function actuallyStartNew({ agent, prompt, cwd, startChat }) {
          // cwd === "" is the "Home" sentinel from the picker — server
          // resolves it to the actual homedir. We store an explicit Home
          // marker so the workspace stays labeled "Home" before any chat
          // exists to read its resolved cwd back.
          let ws;
          if (!cwd) {
            ws = { name: "Home", path: "" };
          } else {
            const matched = projects.find((p) => p.path === cwd);
            ws = matched
              ? { name: matched.name, path: matched.path }
              : { name: basenameOf(cwd) || cwd, path: cwd };
          }
          setActiveWorkspace(ws);
          if (startChat !== false) {
            pendingPromptRef.current = prompt ?? null;
            send({ type: "session.create", agent, cwd });
          }
          setPicker(null);
        }
        function openSession(id) {
          setActiveId(id);
          setChat({
            sessionId: id,
            messages: [],
            status: "idle",
            runStartedAt: null,
            lastDurationMs: null,
          });
          send({ type: "session.resume", sessionId: id });
          setSidebarOpen(false);
          // Switching to a chat ALSO updates the active workspace so that
          // when the user then clicks "+ New chat" the new one goes into
          // the same folder they were just looking at. Without this the
          // active workspace would silently drift from the chat the user
          // sees on screen.
          const session = sessions.find((s) => s.id === id);
          if (session?.cwd) {
            const matched = projects.find((p) => p.path === session.cwd);
            setActiveWorkspace(
              matched
                ? { name: matched.name, path: matched.path }
                : { name: basenameOf(session.cwd), path: session.cwd },
            );
          }
        }
        // Rename: prompt the user with the current title pre-filled. We use
        // window.prompt to keep the UI surface tiny — works the same on
        // mobile Safari + desktop without us shipping a custom modal.
        function renameSession(id, currentTitle) {
          const next = window.prompt("Rename chat", currentTitle ?? "");
          if (next === null) return; // user hit Cancel
          const trimmed = next.trim();
          if (!trimmed || trimmed === currentTitle) return;
          send({ type: "session.rename", sessionId: id, title: trimmed });
        }
        function deleteSession(id, currentTitle) {
          const ok = window.confirm(
            `Delete "${currentTitle ?? "this chat"}"? This removes the conversation history from the laptop.`,
          );
          if (!ok) return;
          send({ type: "session.delete", sessionId: id });
        }
        function sendPrompt(text) {
          if (!chat) return;
          // Claude Code CLI's interactive slash commands (/help, /clear,
          // /goal, /init, /loop, /security-review, …) are TUI features —
          // the SDK passes the prompt straight to the model, which then
          // replies "isn't available in this environment". Catch them here
          // so the user sees a helpful hint instead of a confusing answer
          // and we don't bill a round-trip.
          if (/^\s*\/[a-z][a-z0-9-]*/i.test(text)) {
            setChat((prev) =>
              prev && prev.sessionId === chat.sessionId
                ? {
                    ...prev,
                    messages: [
                      ...prev.messages,
                      { type: "user", raw: { role: "user" }, text },
                      {
                        type: "system",
                        raw: {},
                        text:
                          "Slash commands like /goal and /init are Claude Code TUI features and don't work through Pocket Agents. Type the request in plain words instead.",
                      },
                    ],
                  }
                : prev,
            );
            return;
          }
          send({ type: "prompt", sessionId: chat.sessionId, text });
        }
        function stopChat() {
          if (chat) send({ type: "session.stop", sessionId: chat.sessionId });
        }
        function unpair() {
          clearToken();
          setToken(null);
        }

        return html`
          <${Sidebar}
            sessions=${sessions}
            sessionsLoaded=${sessionsLoaded}
            activeId=${activeId}
            availableAgents=${availableAgents}
            selectedAgent=${selectedAgent}
            wsState=${wsState}
            activeWorkspace=${activeWorkspace}
            onCreate=${createSession}
            onSelectAgent=${setSelectedAgent}
            onOpen=${openSession}
            onRename=${renameSession}
            onDelete=${deleteSession}
            onUnpair=${unpair}
            onChangeWorkspace=${openWorkspacePicker}
            open=${sidebarOpen}
            onClose=${() => setSidebarOpen(false)}
          />
          <main class="main">
            ${(wsState === "closed" || wsState === "auth_failed") &&
            html`<div class="conn-banner">
              ${wsState === "auth_failed"
                ? html`Auth failed: ${wsError ?? "token invalid"}.
                    The dashboard URL was rotated on the laptop. Open the new
                    URL printed by <code>pocket-agents</code>.`
                : html`Connection lost — trying to reconnect…
                    The tunnel URL changes when
                    <code>pocket-agents</code> restarts, so if this persists,
                    grab the latest URL from your terminal and refresh.`}
            </div>`}
            <${MainArea}
              chat=${chat}
              session=${sessions.find((s) => s.id === activeId)}
              projects=${projects}
              activeWorkspace=${activeWorkspace}
              wsState=${wsState}
              wsError=${wsError}
              selectedAgent=${selectedAgent}
              availableAgents=${availableAgents}
              onSelectAgent=${setSelectedAgent}
              onSend=${sendPrompt}
              onStop=${stopChat}
              onStart=${startNewWithPrompt}
              onChangeWorkspace=${openWorkspacePicker}
              onOpenSidebar=${() => setSidebarOpen(true)}
            />
          </main>
          ${sidebarOpen &&
          html`<div
            class="backdrop"
            onClick=${() => setSidebarOpen(false)}
          ></div>`}
          ${picker &&
          html`<${ProjectPicker}
            agent=${picker.agent}
            prompt=${picker.prompt}
            intent=${picker.intent}
            projects=${projects}
            discovered=${discovered}
            activeWorkspace=${activeWorkspace}
            error=${projectsError}
            onPick=${(cwd) =>
              actuallyStartNew({
                agent: picker.agent,
                prompt: picker.prompt,
                cwd,
                // "change" intent doesn't auto-start a chat — user is just
                // re-targeting their workspace. Other intents start one.
                startChat: picker.intent !== "change",
              })}
            onClose=${() => setPicker(null)}
            onAddProject=${(path, name) =>
              send({ type: "projects.add", path, name, pinned: true })}
            onRemoveProject=${(path) =>
              send({ type: "projects.remove", path })}
            onTogglePin=${(path) =>
              send({ type: "projects.toggle_pin", path })}
          />`}
        `;
      }

      /**
       * Bottom-sheet modal where the user picks WHERE the new chat will run.
       * Pinned + saved projects, then Home (~), then a custom path input.
       * `prompt` (optional) is just a hint shown in the header so the user
       * knows the picker is mid-flight in a "type-then-pick" hero flow.
       */
      function ProjectPicker({
        agent,
        prompt,
        intent,
        activeWorkspace,
        projects,
        discovered,
        error,
        onPick,
        onClose,
        onAddProject,
        onRemoveProject,
        onTogglePin,
      }) {
        const titleText =
          intent === "change"
            ? "Switch workspace"
            : intent === "connect"
              ? "Connect a folder"
              : `Where should ${agentLabel(agent)} work?`;
        const [customPath, setCustomPath] = useState("");
        const inputRef = useRef(null);

        useEffect(() => {
          // Focus the custom path input on mount so power users can paste a
          // path immediately. Mobile keyboards may not pop up automatically
          // but desktop gets the focus ring.
          inputRef.current?.focus();
        }, []);

        function submitCustom() {
          const path = customPath.trim();
          if (!path) return;
          // Heuristic: if the path doesn't look like an existing project, add
          // it AND start. The server's projects.add validates the path; if it
          // fails we just fire onPick with the typed value and let session
          // creation use it as a one-off (server falls back to default cwd if
          // invalid).
          onAddProject(path);
          onPick(path);
        }

        const pinned = projects.filter((p) => p.pinned);
        const others = projects.filter((p) => !p.pinned);
        // Hide discovered entries that the user already saved as a project
        // so the same folder doesn't appear in two sections.
        const savedPaths = new Set(projects.map((p) => p.path));
        const suggestions = (discovered ?? []).filter(
          (d) => !savedPaths.has(d.path),
        );
        // Group by parent for a "in ~/Documents/GitHub: A, B, C" layout.
        const grouped = new Map();
        for (const s of suggestions) {
          if (!grouped.has(s.parent)) grouped.set(s.parent, []);
          grouped.get(s.parent).push(s);
        }

        return html`
          <div
            class="modal-backdrop"
            onClick=${(e) => {
              if (e.target.classList.contains("modal-backdrop")) onClose();
            }}
          >
            <div class="modal" role="dialog" aria-label="Pick a project">
              <div class="modal-grabber"></div>
              <h3>${titleText}</h3>
              ${prompt &&
              html`<div class="modal-sub">
                Will send: <em>${prompt.length > 80 ? prompt.slice(0, 80) + "…" : prompt}</em>
              </div>`}
              ${activeWorkspace &&
              !prompt &&
              intent === "change" &&
              html`<div class="modal-sub">
                Currently: <em>${activeWorkspace.name}</em>
              </div>`}
              ${error && html`<div class="modal-error">${error}</div>`}
              <div class="modal-list">
                <div class="section-label">Quick</div>
                <div
                  class="project-row"
                  onClick=${() => onPick("")}
                  role="button"
                >
                  <div class="project-icon">🏠</div>
