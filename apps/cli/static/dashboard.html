<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#0b0b0c" />
    <title>AgentDeck</title>
    <style>
      /* ============================================================
         Design tokens — Manus-inspired dark palette
         ============================================================ */
      :root {
        --bg-page: #050506;
        --bg-panel: #0d0d0e;
        --bg-sidebar: #161617;
        --bg-card: #1a1a1c;
        --bg-card-2: #1f1f21;
        --bg-card-hover: #26262a;
        --border-soft: rgba(255, 255, 255, 0.05);
        --border-strong: rgba(255, 255, 255, 0.11);
        --text-main: #f4f4f5;
        --text-muted: #a4a4ab;
        --text-faint: #71717a;

        /* Per-agent palette — assigned to --accent at body scope */
        --claude-accent: #d97757;
        --claude-soft: rgba(217, 119, 87, 0.14);
        --codex-accent: #14b8a6;
        --codex-soft: rgba(20, 184, 166, 0.14);

        --accent: var(--claude-accent);
        --accent-soft: var(--claude-soft);

        --success: #22c55e;
        --warning: #f59e0b;
        --error: #ef4444;

        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 24px;
      }
      body[data-agent="claude"] {
        --accent: var(--claude-accent);
        --accent-soft: var(--claude-soft);
      }
      body[data-agent="codex"] {
        --accent: var(--codex-accent);
        --accent-soft: var(--codex-soft);
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg-page);
        color: var(--text-main);
        font-family:
          -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto,
          sans-serif;
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior: none;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      button {
        background: none;
        border: none;
        color: inherit;
        font: inherit;
        cursor: pointer;
        padding: 0;
      }
      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      textarea {
        background: none;
        border: none;
        color: inherit;
        font: inherit;
        outline: none;
        resize: none;
      }
      input {
        background: none;
        border: none;
        color: inherit;
        font: inherit;
        outline: none;
      }
      pre {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 6px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.16);
      }

      /* ============================================================
         App shell — mobile-first column. On desktop, centered panel.
         ============================================================ */
      #app {
        position: relative;
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 420px;
        height: 100dvh;
        min-height: 0;
        background: var(--bg-panel);
        overflow: hidden;
      }
      @media (min-width: 720px) {
        /* Desktop: app sits in the middle with a subtle frame so it reads as
           "premium phone preview". Outside is even darker than the panel. */
        body {
          background: var(--bg-page);
          padding: 0;
        }
        #app {
          height: min(100dvh, 880px);
          max-height: 100dvh;
          margin: max(0px, calc((100dvh - 880px) / 2)) 0;
          border-radius: 28px;
          border: 1px solid var(--border-soft);
          box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
        }
      }

      /* ============================================================
         Sidebar (always overlay drawer)
         ============================================================ */
      .sidebar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: min(280px, 84vw);
        background: var(--bg-sidebar);
        z-index: 30;
        display: flex;
        flex-direction: column;
        transform: translateX(-100%);
        transition: transform 0.22s cubic-bezier(0.32, 0.72, 0.3, 1);
        will-change: transform;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      .sidebar.open {
        transform: translateX(0);
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.55),
          0 0 0 1px var(--border-soft);
      }
      .backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 20;
        animation: fade-in 0.18s ease;
      }
      @keyframes fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .sidebar-header {
        padding: 18px 18px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sidebar-header h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
        flex: 1;
        color: var(--text-main);
      }
      .sidebar-close {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: var(--text-muted);
      }
      .sidebar-close:hover {
        background: var(--bg-card);
        color: var(--text-main);
      }

      .conn-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text-faint);
      }
      .conn-dot.open {
        background: var(--success);
      }
      .conn-dot.connecting,
      .conn-dot.authing {
        background: var(--warning);
        animation: pulse 1s infinite;
      }
      .conn-dot.closed,
      .conn-dot.auth_failed {
        background: var(--error);
      }
      @keyframes pulse {
        50% {
          opacity: 0.4;
        }
      }

      /* Agent segmented control */
      .agent-picker {
        display: flex;
        gap: 4px;
        margin: 6px 14px 0;
        padding: 4px;
        background: var(--bg-card);
        border-radius: 12px;
      }
      .agent-option {
        flex: 1;
        padding: 8px 10px;
        border-radius: 9px;
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition:
          background 0.15s ease,
          color 0.15s ease;
      }
      .agent-option:hover {
        color: var(--text-main);
      }
      .agent-option .agent-glyph {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .agent-option[data-agent="claude"] .agent-glyph {
        background: var(--claude-accent);
      }
      .agent-option[data-agent="codex"] .agent-glyph {
        background: var(--codex-accent);
      }
      .agent-option.active {
        background: var(--bg-card-hover);
        color: var(--text-main);
      }
      .agent-option.active[data-agent="claude"] {
        color: var(--claude-accent);
      }
      .agent-option.active[data-agent="codex"] {
        color: var(--codex-accent);
      }

      /* New chat — full-width pill */
      .new-chat {
        margin: 12px 14px 6px;
        padding: 12px 14px;
        background: var(--accent);
        color: #0a0a0b;
        border-radius: 12px;
        font-weight: 600;
        font-size: 13.5px;
        text-align: center;
        transition: filter 0.15s ease;
      }
      .new-chat:hover {
        filter: brightness(1.08);
      }

      /* Chat list */
      .sessions {
        flex: 1;
        overflow-y: auto;
        padding: 8px 8px 16px;
      }
      .sessions-label {
        padding: 12px 12px 6px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-faint);
      }
      .session-item {
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        margin: 1px 0;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: background 0.12s ease;
      }
      .session-item:hover {
        background: var(--bg-card);
      }
      .session-item.active {
        background: rgba(255, 255, 255, 0.04);
        box-shadow: inset 0 0 0 1px var(--border-soft);
      }
      .session-title {
        font-size: 13.5px;
        color: var(--text-main);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .session-text {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .session-meta {
        font-size: 11.5px;
        color: var(--text-faint);
        margin-top: 2px;
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-faint);
        flex-shrink: 0;
      }
      .status-dot.running {
        background: var(--warning);
        animation: pulse 1s infinite;
      }
      .status-dot.error {
        background: var(--error);
      }
      .status-dot.done {
        background: var(--success);
      }

      .empty {
        padding: 28px 18px;
        color: var(--text-faint);
        font-size: 13px;
        text-align: center;
        line-height: 1.6;
      }

      /* Agent chip — used in session items and chat header */
      .agent-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 9.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 2px 7px;
        border-radius: 999px;
        flex-shrink: 0;
        opacity: 0.85;
      }
      .agent-chip[data-agent="claude"] {
        background: rgba(217, 119, 87, 0.1);
        color: var(--claude-accent);
      }
      .agent-chip[data-agent="codex"] {
        background: rgba(20, 184, 166, 0.1);
        color: var(--codex-accent);
      }
      .agent-chip .agent-glyph {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: currentColor;
      }

      .sidebar-footer {
        padding: 12px 16px;
        font-size: 11.5px;
        color: var(--text-faint);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .sidebar-footer button {
        color: var(--text-muted);
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 11.5px;
      }
      .sidebar-footer button:hover {
        color: var(--text-main);
        background: var(--bg-card);
      }

      /* ============================================================
         Main area
         ============================================================ */
      .main {
        flex: 1;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .main-header {
        padding: 12px 14px;
        padding-top: max(12px, env(safe-area-inset-top));
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 56px;
        border-bottom: 1px solid var(--border-soft);
        background: var(--bg-panel);
      }
      .menu-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: var(--text-muted);
        transition: background 0.12s ease;
      }
      .menu-btn:hover {
        background: var(--bg-card);
        color: var(--text-main);
      }
      .header-title {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .header-title h2 {
        margin: 0;
        font-size: 14.5px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text-main);
        letter-spacing: -0.005em;
        line-height: 1.25;
      }
      .header-meta {
        font-size: 11px;
        color: var(--text-faint);
        line-height: 1.25;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .main-header .badge {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 3px 8px;
        border-radius: 5px;
        background: var(--bg-card);
        color: var(--text-muted);
        flex-shrink: 0;
      }
      .badge.running {
        background: var(--accent-soft);
        color: var(--accent);
      }

      /* ============================================================
         Empty hero — Manus-style "What can I help you with?"
         ============================================================ */
      .empty-hero {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 22px 32px;
        gap: 12px;
        text-align: center;
        overflow-y: auto;
      }
      .empty-hero h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: var(--text-main);
        max-width: 14ch;
      }
      .empty-hero .hero-sub {
        margin: 0 0 14px;
        color: var(--text-muted);
        font-size: 14.5px;
        max-width: 28ch;
      }
      .hero-composer {
        width: 100%;
        max-width: 440px;
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 22px;
        padding: 8px 10px;
        display: flex;
        align-items: flex-end;
        gap: 6px;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }
      .hero-composer:focus-within {
        border-color: var(--accent);
        background: var(--bg-card-2);
      }
      .hero-composer textarea {
        flex: 1;
        min-height: 28px;
        max-height: 180px;
        padding: 6px 0;
        font-size: 15px;
        color: var(--text-main);
      }
      .hero-composer textarea::placeholder {
        color: var(--text-faint);
      }
      .suggestions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin-top: 8px;
        max-width: 440px;
      }
      .pill {
        background: var(--bg-card);
        color: var(--text-muted);
        font-size: 12.5px;
        font-weight: 500;
        padding: 8px 14px;
        border-radius: 999px;
        transition:
          background 0.12s ease,
          color 0.12s ease;
        white-space: nowrap;
      }
      .pill:hover {
        background: var(--bg-card-hover);
        color: var(--text-main);
      }
      .pill[data-agent="claude"]:hover {
        background: var(--claude-soft);
        color: var(--claude-accent);
      }
      .pill[data-agent="codex"]:hover {
        background: var(--codex-soft);
        color: var(--codex-accent);
      }

      /* ============================================================
         Messages
         ============================================================ */
      .messages {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 16px 14px 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .msg-row {
        display: flex;
        max-width: 100%;
      }
      .msg-row.user {
        justify-content: flex-end;
      }
      .msg-row.assistant {
        justify-content: flex-start;
      }
      .msg-row.system {
        justify-content: center;
      }
      .bubble {
        max-width: 86%;
        padding: 12px 16px;
        border-radius: 18px;
        line-height: 1.6;
        word-break: break-word;
      }
      .bubble.user {
        background: var(--accent-soft);
        color: var(--text-main);
        border-bottom-right-radius: 8px;
        padding: 10px 14px;
      }
      .bubble.assistant {
        background: transparent;
        border: none;
        padding: 4px 2px;
        max-width: 100%;
        color: var(--text-main);
        line-height: 1.65;
      }
      .bubble.user pre {
        font-family: inherit;
        font-size: 14.5px;
      }
      .bubble.assistant pre {
        font-size: 14px;
      }

      /* Markdown rendering inside assistant bubble */
      .md > *:first-child {
        margin-top: 0;
      }
      .md > *:last-child {
        margin-bottom: 0;
      }
      .md p {
        margin: 0.5em 0;
      }
      .md h1,
      .md h2,
      .md h3,
      .md h4 {
        margin: 0.8em 0 0.4em;
        font-weight: 600;
        line-height: 1.3;
        letter-spacing: -0.01em;
      }
      .md h1 {
        font-size: 1.35em;
      }
      .md h2 {
        font-size: 1.2em;
      }
      .md h3 {
        font-size: 1.08em;
      }
      .md ul,
      .md ol {
        margin: 0.4em 0;
        padding-left: 1.3em;
      }
      .md li {
        margin: 0.25em 0;
      }
      .md code {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 0.9em;
        background: rgba(255, 255, 255, 0.08);
        padding: 1.5px 6px;
        border-radius: 5px;
      }
      .md pre {
        background: #0d0d0e;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        padding: 10px 12px;
        overflow-x: auto;
        font-size: 12.5px;
        line-height: 1.55;
        margin: 0.6em 0;
        max-width: 100%;
      }
      .md pre code {
        background: none;
        padding: 0;
        font-size: inherit;
        border-radius: 0;
      }
      .md blockquote {
        border-left: 3px solid var(--border-strong);
        margin: 0.5em 0;
        padding: 0 0 0 12px;
        color: var(--text-muted);
      }
      .md a {
        color: var(--accent);
        text-decoration: underline;
      }
      .md table {
        border-collapse: collapse;
        margin: 0.5em 0;
        display: block;
        overflow-x: auto;
        max-width: 100%;
      }
      .md th,
      .md td {
        border: 1px solid var(--border-soft);
        padding: 5px 9px;
        font-size: 12.5px;
        text-align: left;
      }
      .md th {
        background: rgba(255, 255, 255, 0.03);
      }
      .md hr {
        border: none;
        border-top: 1px solid var(--border-soft);
        margin: 0.9em 0;
      }

      /* Thinking blocks */
      .thinking {
        max-width: 96%;
        background: transparent;
        border: 1px dashed var(--border-strong);
        border-radius: 14px;
        padding: 10px 14px;
        color: var(--text-muted);
        font-size: 13px;
        line-height: 1.55;
      }
      .thinking-header {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-faint);
        cursor: pointer;
        user-select: none;
      }
      .thinking-header::before {
        content: "▸";
        display: inline-block;
        font-size: 10px;
        transition: transform 0.15s ease;
        color: var(--text-faint);
      }
      .thinking.open .thinking-header::before {
        transform: rotate(90deg);
      }
      .thinking-body {
        margin-top: 8px;
        font-style: italic;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .thinking:not(.open) .thinking-body {
        display: none;
      }
      .thinking-body pre {
        font-family: inherit;
        font-size: 13px;
      }

      /* Tool cards */
      .tool-card {
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        padding: 10px 12px;
        max-width: 96%;
      }
      .tool-card.error {
        border-color: rgba(239, 68, 68, 0.3);
      }
      .tool-label {
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--accent);
        margin-bottom: 6px;
      }
      .tool-card.error .tool-label {
        color: var(--error);
      }
      .tool-body {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 12px;
        max-height: 260px;
        overflow-y: auto;
        color: var(--text-main);
      }

      .sys-msg {
        font-size: 11.5px;
        color: var(--text-faint);
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--bg-card);
      }

      /* ============================================================
         Composer (bottom)
         ============================================================ */
      .input-bar {
        padding: 12px 14px;
        padding-bottom: max(14px, env(safe-area-inset-bottom));
        background: var(--bg-panel);
        border-top: 1px solid var(--border-soft);
      }
      .input-shell {
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 22px;
        padding: 8px 10px 8px 10px;
        display: flex;
        align-items: flex-end;
        gap: 6px;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }
      .input-action {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--text-faint);
        font-size: 18px;
        flex-shrink: 0;
        transition:
          background 0.12s ease,
          color 0.12s ease;
      }
      .input-action:hover {
        background: var(--bg-card-hover);
        color: var(--text-main);
      }
      .input-shell:focus-within {
        border-color: var(--accent);
        background: var(--bg-card-2);
      }
      .input-shell textarea {
        flex: 1;
        min-height: 26px;
        max-height: 180px;
        padding: 5px 0;
        font-size: 15px;
        color: var(--text-main);
      }
      .input-shell textarea::placeholder {
        color: var(--text-faint);
      }
      .send-btn {
        background: var(--accent);
        color: #0a0a0b;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 17px;
        font-weight: 700;
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: filter 0.12s ease;
      }
      .send-btn:hover:not(:disabled) {
        filter: brightness(1.08);
      }
      .send-btn:disabled {
        background: var(--bg-card-hover);
        color: var(--text-faint);
        cursor: not-allowed;
      }
      .stop-btn {
        color: var(--error);
        font-weight: 600;
        padding: 6px 12px;
        font-size: 13px;
        border-radius: 8px;
      }
      .stop-btn:hover {
        background: rgba(239, 68, 68, 0.1);
      }

      .status-bar {
        padding: 8px 16px;
        font-size: 12px;
        color: var(--accent);
        background: var(--bg-panel);
        border-top: 1px solid var(--border-soft);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      /* ============================================================
         PIN gate
         ============================================================ */
      .pin-screen {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 32px 24px;
        text-align: center;
      }
      .pin-screen h2 {
        margin: 0;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: -0.01em;
      }
      .pin-screen p {
        color: var(--text-muted);
        margin: 0;
        max-width: 32ch;
        font-size: 14px;
      }
      .pin-input {
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 14px;
        padding: 16px 20px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 22px;
        letter-spacing: 0.45em;
        text-align: center;
        width: 220px;
        color: var(--text-main);
        margin-top: 6px;
      }
      .pin-input:focus {
        border-color: var(--accent);
      }
      .pin-input.error {
        border-color: var(--error);
        animation: shake 0.25s;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-6px);
        }
        75% {
          transform: translateX(6px);
        }
      }
      .pin-error {
        color: var(--error);
        font-size: 13px;
        min-height: 18px;
      }
      .pin-screen button[data-primary] {
        padding: 12px 28px;
        background: var(--accent);
        color: #0a0a0b;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
      }
      .pin-screen button[data-primary]:disabled {
        background: var(--bg-card-hover);
        color: var(--text-faint);
        cursor: not-allowed;
      }
      .pin-screen button[data-secondary] {
        color: var(--text-faint);
        font-size: 13px;
        margin-top: 4px;
        padding: 6px 12px;
        border-radius: 8px;
      }
      .pin-screen button[data-secondary]:hover {
        color: var(--text-muted);
      }

      /* ============================================================
         Pair screen
         ============================================================ */
      .pair-screen {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        flex-direction: column;
        gap: 14px;
        text-align: center;
      }
      .pair-screen h2 {
        margin: 0;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: -0.01em;
      }
      .pair-screen p {
        color: var(--text-muted);
        margin: 0;
        max-width: 32ch;
        font-size: 14px;
      }
      .pair-screen input {
        padding: 12px 14px;
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        font-family: ui-monospace, monospace;
        font-size: 12.5px;
        width: 100%;
        max-width: 320px;
        color: var(--text-main);
        margin-top: 8px;
      }
      .pair-screen input:focus {
        border-color: var(--accent);
      }
      .pair-screen button {
        padding: 12px 28px;
        background: var(--accent);
        color: #0a0a0b;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { h, render } from "https://esm.sh/preact@10.27.0";
      import {
        useState,
        useEffect,
        useRef,
        useMemo,
      } from "https://esm.sh/preact@10.27.0/hooks";
      import htm from "https://esm.sh/htm@3.1.1";
      import { marked } from "https://esm.sh/marked@14.1.4";
      import DOMPurify from "https://esm.sh/dompurify@3.2.4";

      const html = htm.bind(h);

      // Configure marked: GFM (tables, fenced code), line breaks → <br>, no auto-link
      // of bare URLs (agents often include URLs in prose; we don't need every URL
      // becoming a target=_blank surface).
      marked.setOptions({ gfm: true, breaks: true });

      // Render markdown → sanitized HTML. We feed the result to dangerouslySetInnerHTML.
      // DOMPurify strips <script>, on* handlers, javascript: URLs, etc., so even a
      // pathological agent response can't xss the dashboard.
      function renderMarkdown(text) {
        if (typeof text !== "string" || text.length === 0) return "";
        const raw = marked.parse(text);
        return DOMPurify.sanitize(raw, {
          USE_PROFILES: { html: true },
          ADD_ATTR: ["target", "rel"],
        });
      }
      const PROTOCOL_VERSION = 1;
      const TOKEN_KEY = "agentdeck:token:v1";

      /* ──────────── Token & WS handling ──────────── */

      function readToken() {
        const url = new URL(window.location.href);
        const fromQuery = url.searchParams.get("t");
        if (fromQuery) {
          localStorage.setItem(TOKEN_KEY, fromQuery);
          // Strip token from URL so it doesn't sit in browser history
          url.searchParams.delete("t");
          window.history.replaceState({}, "", url.toString());
          return fromQuery;
        }
        return localStorage.getItem(TOKEN_KEY);
      }

      function clearToken() {
        localStorage.removeItem(TOKEN_KEY);
      }

      function wsUrl() {
        const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
        return `${proto}//${window.location.host}/ws`;
      }

      /* ──────────── Time helpers ──────────── */
      function timeAgo(ts) {
        const sec = Math.floor((Date.now() - ts) / 1000);
        if (sec < 60) return `${sec}s`;
        if (sec < 3600) return `${Math.floor(sec / 60)}m`;
        if (sec < 86400) return `${Math.floor(sec / 3600)}h`;
        return `${Math.floor(sec / 86400)}d`;
      }
      function prettyJson(v) {
        try {
          return JSON.stringify(v, null, 2);
        } catch {
          return String(v);
        }
      }
      function agentLabel(agent) {
        return agent === "codex" ? "Codex" : "Claude";
      }

      /**
       * Strip the "· timestamp" suffix the server appends to default session
       * titles. We don't touch the DB (no backend change), we just render a
       * cleaner version. Custom user-provided titles pass through unchanged.
       */
      function prettyTitle(session) {
        if (!session) return "Chat";
        const raw = session.title || "";
        // Default title shape: "New chat · 5/26/2026, 11:29:28 AM"
        if (/^New chat · /.test(raw)) {
          return `New ${agentLabel(session.agent)} chat`;
        }
        return raw;
      }

      /** "Today, 11:29 AM" / "Yesterday, 6:14 PM" / "May 24, 11:00 AM". */
      function friendlyTime(ts) {
        const d = new Date(ts);
        const now = new Date();
        const sameDay = d.toDateString() === now.toDateString();
        const yesterday = new Date(now);
        yesterday.setDate(now.getDate() - 1);
        const isYesterday = d.toDateString() === yesterday.toDateString();
        const time = d.toLocaleTimeString(undefined, {
          hour: "numeric",
          minute: "2-digit",
        });
        if (sameDay) return `Today, ${time}`;
        if (isYesterday) return `Yesterday, ${time}`;
        return `${d.toLocaleDateString(undefined, { month: "short", day: "numeric" })}, ${time}`;
      }
      function agentTagline(agent) {
        return agent === "codex"
          ? "Codex CLI — OpenAI's code agent."
          : "Claude Code — Anthropic's code agent.";
      }

      /* Apply the agent's accent color to <body> so all `var(--accent)` rules
         re-theme without touching individual components. */
      function applyAgentTheme(agent) {
        document.body.dataset.agent = agent === "codex" ? "codex" : "claude";
      }
      applyAgentTheme("claude"); // sensible default before first render

      /* ──────────── Components ──────────── */

      function App() {
        const [token, setToken] = useState(readToken());
        const [wsState, setWsState] = useState("idle");
        const [wsError, setWsError] = useState(null);
        const [sessions, setSessions] = useState([]);
        const [activeId, setActiveId] = useState(null);
        const [chat, setChat] = useState(null); // { sessionId, messages, status }
        const [sidebarOpen, setSidebarOpen] = useState(false);
        const [availableAgents, setAvailableAgents] = useState(["claude"]);
        const [selectedAgent, setSelectedAgent] = useState("claude");
        const [pinState, setPinState] = useState("none"); // 'none' | 'required' | 'verifying' | 'ok' | 'wrong'
        const [pinError, setPinError] = useState(null);
        const [pinAttemptsLeft, setPinAttemptsLeft] = useState(null);

        const wsRef = useRef(null);

        // Keep <body data-agent="..."> in sync with the active chat's agent
        // (falls back to the currently-selected agent in the picker). This is
        // what swaps the entire UI to Claude orange vs Codex green.
        useEffect(() => {
          const chatAgent = sessions.find((s) => s.id === activeId)?.agent;
          applyAgentTheme(chatAgent ?? selectedAgent);
        }, [activeId, sessions, selectedAgent]);

        function send(cmd) {
          const ws = wsRef.current;
          if (ws && ws.readyState === WebSocket.OPEN)
            ws.send(JSON.stringify(cmd));
        }

        useEffect(() => {
          if (!token) return;
          let socket;
          let reconnectTimer;
          let alive = true;

          function connect() {
            setWsState("connecting");
            setWsError(null);
            socket = new WebSocket(wsUrl());
            wsRef.current = socket;

            socket.onopen = () => {
              setWsState("authing");
              socket.send(
                JSON.stringify({
                  type: "auth",
                  token,
                  protocolVersion: PROTOCOL_VERSION,
                }),
              );
            };
            socket.onmessage = (ev) => {
              let evt;
              try {
                evt = JSON.parse(ev.data);
              } catch {
                return;
              }
              handleEvent(evt);
            };
            socket.onerror = () => {
              setWsError("connection error");
            };
            socket.onclose = () => {
              if (!alive) return;
              setWsState("closed");
              reconnectTimer = setTimeout(connect, 1500);
            };
          }

          function handleEvent(evt) {
            switch (evt.type) {
              case "auth.ok":
                setWsState("open");
                setWsError(null);
                if (Array.isArray(evt.agent) && evt.agent.length) {
                  setAvailableAgents(evt.agent);
                  setSelectedAgent((current) =>
                    evt.agent.includes(current) ? current : evt.agent[0],
                  );
                }
                if (evt.pinRequired) {
                  setPinState("required");
                  setPinError(null);
                  // Don't request session.list yet — it would be rejected by
                  // the PIN gate. We'll list after pin.ok arrives.
                } else {
                  setPinState("none");
                  send({ type: "session.list" });
                }
                break;
              case "auth.fail":
                setWsState("auth_failed");
                setWsError(evt.reason);
                // Bad token — wipe it so user re-pairs
                clearToken();
                setTimeout(() => setToken(null), 400);
                break;
              case "pin.ok":
                setPinState("ok");
                setPinError(null);
                setPinAttemptsLeft(null);
                send({ type: "session.list" });
                break;
              case "pin.fail":
                setPinState("wrong");
                setPinError(evt.reason);
                setPinAttemptsLeft(evt.attemptsRemaining);
                break;
              case "session.list":
                setSessions(evt.sessions);
                break;
              case "session.created":
                setSessions((prev) => [
                  evt.session,
                  ...prev.filter((s) => s.id !== evt.session.id),
                ]);
                setActiveId(evt.session.id);
                setChat({
                  sessionId: evt.session.id,
                  messages: [],
                  status: "idle",
                });
                setSidebarOpen(false);
                // Auto-fire a pending prompt queued by the hero composer.
                if (pendingPromptRef.current) {
                  const text = pendingPromptRef.current;
                  pendingPromptRef.current = null;
                  send({
                    type: "prompt",
                    sessionId: evt.session.id,
                    text,
                  });
                }
                break;
              case "session.history":
                setChat({
                  sessionId: evt.sessionId,
                  messages: evt.messages,
                  status: evt.status,
                });
                break;
              case "session.deleted":
                setSessions((prev) =>
                  prev.filter((s) => s.id !== evt.sessionId),
                );
                if (activeId === evt.sessionId) {
                  setActiveId(null);
                  setChat(null);
                }
                break;
              case "agent.message":
                setChat((prev) => {
                  if (!prev || prev.sessionId !== evt.sessionId) return prev;
                  return { ...prev, messages: [...prev.messages, evt.message] };
                });
                setSessions((prev) => {
                  const next = prev.map((s) =>
                    s.id === evt.sessionId
                      ? {
                          ...s,
                          lastMessageAt: Date.now(),
                          messageCount: s.messageCount + 1,
                        }
                      : s,
                  );
                  next.sort((a, b) => b.lastMessageAt - a.lastMessageAt);
                  return next;
                });
                break;
              case "agent.status":
                setChat((prev) =>
                  prev && prev.sessionId === evt.sessionId
                    ? { ...prev, status: evt.status }
                    : prev,
                );
                setSessions((prev) =>
                  prev.map((s) =>
                    s.id === evt.sessionId ? { ...s, status: evt.status } : s,
                  ),
                );
                break;
              case "agent.error":
                setWsError(evt.error);
                break;
            }
          }

          connect();
          return () => {
            alive = false;
            clearTimeout(reconnectTimer);
            try {
              socket && socket.close();
            } catch {}
            wsRef.current = null;
          };
        }, [token]);

        if (!token)
          return html`<${PairScreen}
            onPair=${(t) => {
              localStorage.setItem(TOKEN_KEY, t);
              setToken(t);
            }}
          />`;

        // PIN gate: opens AFTER token auth succeeds, BEFORE the sidebar/main UI.
        // Reuses the same WS — we just don't render the app until pin.ok arrives.
        if (pinState === "required" || pinState === "wrong" || pinState === "verifying") {
          return html`<${PinScreen}
            error=${pinError}
            attemptsLeft=${pinAttemptsLeft}
            busy=${pinState === "verifying"}
            onSubmit=${(p) => {
              setPinState("verifying");
              setPinError(null);
              send({ type: "pin.verify", pin: p });
            }}
            onUnpair=${() => {
              clearToken();
              setToken(null);
            }}
          />`;
        }

        // Holds a prompt that should be auto-sent the moment a fresh session
        // is created server-side. Used by the empty-hero composer so the user
        // can "type-then-send" without the two-step (create → then type) UX.
        const pendingPromptRef = useRef(null);
        function createSession() {
          send({ type: "session.create", agent: selectedAgent });
        }
        function startNewWithPrompt(agent, prompt) {
          setSelectedAgent(agent);
          pendingPromptRef.current = prompt;
          send({ type: "session.create", agent });
        }
        function openSession(id) {
          setActiveId(id);
          setChat({ sessionId: id, messages: [], status: "idle" });
          send({ type: "session.resume", sessionId: id });
          setSidebarOpen(false);
        }
        function sendPrompt(text) {
          if (chat) send({ type: "prompt", sessionId: chat.sessionId, text });
        }
        function stopChat() {
          if (chat) send({ type: "session.stop", sessionId: chat.sessionId });
        }
        function unpair() {
          clearToken();
          setToken(null);
        }

        return html`
          <${Sidebar}
            sessions=${sessions}
            activeId=${activeId}
            availableAgents=${availableAgents}
            selectedAgent=${selectedAgent}
            wsState=${wsState}
            onCreate=${createSession}
            onSelectAgent=${setSelectedAgent}
            onOpen=${openSession}
            onUnpair=${unpair}
            open=${sidebarOpen}
            onClose=${() => setSidebarOpen(false)}
          />
          <main class="main">
            <${MainArea}
              chat=${chat}
              session=${sessions.find((s) => s.id === activeId)}
              wsState=${wsState}
              wsError=${wsError}
              selectedAgent=${selectedAgent}
              availableAgents=${availableAgents}
              onSelectAgent=${setSelectedAgent}
              onSend=${sendPrompt}
              onStop=${stopChat}
              onStart=${startNewWithPrompt}
              onOpenSidebar=${() => setSidebarOpen(true)}
            />
          </main>
          ${sidebarOpen &&
          html`<div
            class="backdrop"
            onClick=${() => setSidebarOpen(false)}
          ></div>`}
        `;
      }

      function PinScreen({ error, attemptsLeft, busy, onSubmit, onUnpair }) {
        const [val, setVal] = useState("");
        const ref = useRef(null);

        // Auto-focus + auto-clear on error so the user can retype straight away.
        useEffect(() => {
          ref.current?.focus();
        }, []);
        useEffect(() => {
          if (error) {
            setVal("");
            ref.current?.focus();
          }
        }, [error]);

        function submit() {
          const trimmed = val.trim();
          if (trimmed.length >= 4 && !busy) onSubmit(trimmed);
        }

        return html`
          <div class="pin-screen">
            <h2>Enter PIN</h2>
            <p>
              This laptop requires a second factor. Enter the PIN you set with
              <code>agentdeck --set-pin</code>.
            </p>
            <input
              ref=${ref}
              class=${"pin-input" + (error ? " error" : "")}
              type="password"
              inputmode="numeric"
              autocomplete="off"
              autocorrect="off"
              spellcheck="false"
              maxlength="10"
              value=${val}
              disabled=${busy}
              onInput=${(e) => setVal(e.target.value)}
              onKeyDown=${(e) => e.key === "Enter" && submit()}
            />
            <div class="pin-error">
              ${error
                ? attemptsLeft != null
                  ? `${error} · ${attemptsLeft} attempts left`
                  : error
                : ""}
            </div>
            <button
              data-primary
              onClick=${submit}
              disabled=${busy || val.trim().length < 4}
            >
              ${busy ? "Verifying…" : "Unlock"}
            </button>
            <button data-secondary onClick=${onUnpair}>
              Unpair instead
            </button>
          </div>
        `;
      }

      function PairScreen({ onPair }) {
        const [input, setInput] = useState("");
        function handleSubmit() {
          const t = input.trim();
          if (!t) return;
          onPair(t);
        }
        return html`
          <div class="pair-screen">
            <h2>Pair this device</h2>
            <p
              style="color: var(--muted); text-align: center; margin: 0; max-width: 360px;"
            >
              Paste the pairing token from your laptop, or open the dashboard
              URL with <code>?t=&lt;token&gt;</code>.
            </p>
            <input
              type="password"
              autocapitalize="off"
              autocorrect="off"
              autocomplete="off"
              spellcheck="false"
              value=${input}
              onInput=${(e) => setInput(e.target.value)}
              onKeyDown=${(e) => e.key === "Enter" && handleSubmit()}
              placeholder="paste token here"
            />
            <button onClick=${handleSubmit}>Pair</button>
          </div>
        `;
      }

      function Sidebar({
        sessions,
        activeId,
        availableAgents,
        selectedAgent,
        wsState,
        onCreate,
        onSelectAgent,
        onOpen,
        onUnpair,
        open,
        onClose,
      }) {
        return html`
          <aside class=${"sidebar" + (open ? " open" : "")}>
            <div class="sidebar-header">
              <div class=${"conn-dot " + wsState}></div>
              <h1>AgentDeck</h1>
              <button
                class="sidebar-close"
                onClick=${onClose}
                aria-label="Close sidebar"
              >
                ✕
              </button>
            </div>
            <div class="agent-picker" role="tablist" aria-label="Agent">
              ${availableAgents.map(
                (agent) => html`
                  <button
                    key=${agent}
                    data-agent=${agent}
                    class=${"agent-option" +
                    (agent === selectedAgent ? " active" : "")}
                    onClick=${() => onSelectAgent(agent)}
                    aria-label=${agentLabel(agent)}
                  >
                    <span class="agent-glyph"></span>${agentLabel(agent)}
                  </button>
                `,
              )}
            </div>
            <button class="new-chat" onClick=${onCreate}>
              New ${agentLabel(selectedAgent)} chat
            </button>
            <div class="sessions">
              ${sessions.length === 0
                ? html`<div class="empty">
                    No chats yet.<br />Start a new one above.
                  </div>`
                : html`<div class="sessions-label">Recent</div>
                    ${sessions.map(
                      (s) => html`
                        <div
                          key=${s.id}
                          class=${"session-item" +
                          (s.id === activeId ? " active" : "")}
                          onClick=${() => onOpen(s.id)}
                        >
                          <div style="flex: 1; min-width: 0;">
                            <div class="session-title">
                              <span class="agent-chip" data-agent=${s.agent}>
                                <span class="agent-glyph"></span>${agentLabel(
                                  s.agent,
                                )}
                              </span>
                              <span class="session-text"
                                >${prettyTitle(s)}</span
                              >
                            </div>
                            <div class="session-meta">
                              ${s.messageCount} msgs ·
                              ${timeAgo(s.lastMessageAt)} ago
                            </div>
                          </div>
                          ${(s.status === "running" || s.status === "error") &&
                          html`<div
                            class=${"status-dot " + s.status}
                          ></div>`}
                        </div>
                      `,
                    )}`}
            </div>
            <div class="sidebar-footer">
              <span>${wsState === "open" ? "Connected" : wsState}</span>
              <button onClick=${onUnpair}>Unpair</button>
            </div>
          </aside>
        `;
      }

      function MainArea({
        chat,
        session,
        wsState,
        wsError,
        selectedAgent,
        availableAgents,
        onSelectAgent,
        onSend,
        onStop,
        onStart,
        onOpenSidebar,
      }) {
        if (!chat) {
          return html`
            <header class="main-header">
              <button
                class="menu-btn"
                onClick=${onOpenSidebar}
                aria-label="Open menu"
              >
                ☰
              </button>
              <h2>AgentDeck</h2>
            </header>
            <${EmptyHero}
              selectedAgent=${selectedAgent}
              availableAgents=${availableAgents}
              onSelectAgent=${onSelectAgent}
              onStart=${onStart}
              wsState=${wsState}
              wsError=${wsError}
            />
          `;
        }

        const currentAgent = session?.agent ?? "claude";

        return html`
          <header class="main-header">
            <button
              class="menu-btn"
              onClick=${onOpenSidebar}
              aria-label="Open menu"
            >
              ☰
            </button>
            <span class="agent-chip" data-agent=${currentAgent}>
              <span class="agent-glyph"></span>${agentLabel(currentAgent)}
            </span>
            <div class="header-title">
              <h2>${prettyTitle(session)}</h2>
              ${session &&
              html`<span class="header-meta"
                >${friendlyTime(session.createdAt)}</span
              >`}
            </div>
            ${chat.status === "running" &&
            html`<span class="badge running">working</span>`}
            ${chat.status === "error" &&
            html`<span class="badge" style="color: var(--error);">error</span>`}
          </header>
          <${MessageList} messages=${chat.messages} status=${chat.status} />
          ${chat.status === "running" &&
          html` <div class="status-bar">
            <span>${agentLabel(currentAgent)} is working...</span>
            <button class="stop-btn" onClick=${onStop}>Stop</button>
          </div>`}
          <${InputBar}
            agent=${currentAgent}
            disabled=${chat.status === "running"}
            onSend=${onSend}
          />
        `;
      }

      /**
       * Manus-style home: centered headline + composer + suggestion pills.
       * Composer here doesn't talk to a session (none exists yet). On send,
       * it calls onStart(agent, prompt) which (a) creates a fresh session,
       * (b) queues the prompt so it auto-fires once `session.created`
       * arrives. Pills do the same with pre-filled prompts.
       */
      function EmptyHero({
        selectedAgent,
        availableAgents,
        onSelectAgent,
        onStart,
        wsState,
        wsError,
      }) {
        const [val, setVal] = useState("");
        const taRef = useRef(null);

        function autoresize() {
          const ta = taRef.current;
          if (!ta) return;
          ta.style.height = "auto";
          ta.style.height = Math.min(180, ta.scrollHeight) + "px";
        }
        function submit() {
          const text = val.trim();
          if (!text) return;
          onStart(selectedAgent, text);
          setVal("");
          requestAnimationFrame(autoresize);
        }

        const subtitle =
          wsState === "open"
            ? "Pick an agent and start a chat."
            : `Connection: ${wsState}${wsError ? " · " + wsError : ""}`;

        return html`
          <div class="empty-hero">
            <h1>What can I help you with?</h1>
            <p class="hero-sub">${subtitle}</p>
            <div class="hero-composer">
              <button
                class="input-action"
                disabled
                aria-label="Attach (coming soon)"
                title="Attachments — coming soon"
              >
                +
              </button>
              <textarea
                ref=${taRef}
                value=${val}
                placeholder=${`Ask ${agentLabel(selectedAgent)} anything…`}
                rows="1"
                onInput=${(e) => {
                  setVal(e.target.value);
                  autoresize();
                }}
                onKeyDown=${(e) => {
                  if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    submit();
                  }
                }}
              />
              <button
                class="send-btn"
                disabled=${!val.trim() || wsState !== "open"}
                onClick=${submit}
                aria-label="Send"
              >
                ↑
              </button>
            </div>
            <div class="suggestions">
              ${availableAgents.map(
                (a) => html`
                  <button
                    key=${a}
                    class="pill"
                    data-agent=${a}
                    onClick=${() => onSelectAgent(a)}
                  >
                    Switch to ${agentLabel(a)}
                  </button>
                `,
              )}
              <button
                class="pill"
                onClick=${() =>
                  onStart(selectedAgent, "What can you do? Be concise.")}
              >
                What can you do?
              </button>
              <button
                class="pill"
                onClick=${() =>
                  onStart(
                    selectedAgent,
                    "Summarize the most important file in this project in 5 bullets.",
                  )}
              >
                Summarize this project
              </button>
            </div>
          </div>
        `;
      }

      function MessageList({ messages, status }) {
        const ref = useRef(null);
        useEffect(() => {
          const el = ref.current;
          if (!el) return;
          el.scrollTop = el.scrollHeight;
        }, [messages.length, status]);

        return html`
          <div class="messages" ref=${ref}>
            ${messages.length === 0 && status !== "running"
              ? html`<div class="empty-chat">
                  <h3>New chat</h3>
                  <p>Send a prompt to start the agent.</p>
                </div>`
              : messages.map(
                  (m, i) => html`<${MessageRow} key=${i} msg=${m} />`,
                )}
          </div>
        `;
      }

      function MessageRow({ msg }) {
        if (msg.type === "user") {
          // User input is plain text — render as preformatted so newlines survive,
          // but don't run markdown over it (avoids surprises like `**hi**` getting bolded).
          return html`<div class="msg-row user">
            <div class="bubble user"><pre>${msg.text ?? ""}</pre></div>
          </div>`;
        }
        if (msg.type === "thinking") {
          return html`<${ThinkingBubble} text=${msg.thinking ?? msg.text ?? ""} />`;
        }
        if (msg.type === "redacted_thinking") {
          return html`<div class="msg-row assistant">
            <div class="thinking">
              <span class="thinking-header" style="cursor: default;">
                Thinking · redacted
              </span>
            </div>
          </div>`;
        }
        // Dedicated tool_use row — emitted by the adapter as its own message
        // since 0.4. We still match `msg.tool` defensively for older rows
        // already persisted in SQLite.
        if (msg.type === "tool_use" || (msg.type === "assistant" && msg.tool)) {
          return html` <div class="msg-row assistant">
            <div class="tool-card">
              <div class="tool-label">Tool · ${msg.tool?.name ?? "?"}</div>
              ${msg.tool?.input != null &&
              html`<div class="tool-body">
                <pre>${prettyJson(msg.tool.input)}</pre>
              </div>`}
            </div>
          </div>`;
        }
        if (msg.type === "assistant") {
          // Plain text reply — markdown rendered + sanitized.
          return html` <div class="msg-row assistant">
            <div
              class="bubble assistant md"
              dangerouslySetInnerHTML=${{
                __html: renderMarkdown(msg.text ?? ""),
              }}
            ></div>
          </div>`;
        }
        if (msg.type === "tool_result" || msg.toolResult) {
          const out = msg.toolResult?.output;
          return html` <div class="msg-row assistant">
            <div
              class=${"tool-card" + (msg.toolResult?.isError ? " error" : "")}
            >
              <div class="tool-label">
                Tool result${msg.toolResult?.isError ? " (error)" : ""}
              </div>
              <div class="tool-body">
                <pre>${typeof out === "string" ? out : prettyJson(out)}</pre>
              </div>
            </div>
          </div>`;
        }
        if (msg.type === "result" || msg.type === "system") {
          return html`<div class="msg-row system">
            <div class="sys-msg">${msg.text ?? msg.type}</div>
          </div>`;
        }
        if (msg.type === "error") {
          return html`<div class="msg-row system">
            <div
              class="sys-msg"
              style="color: var(--error); border-color: var(--error);"
            >
              ${msg.text ?? "error"}
            </div>
          </div>`;
        }
        return null;
      }

      function ThinkingBubble({ text }) {
        // Default state: collapsed. The user can tap the header to see the
        // model's chain-of-thought. We mirror the Claude.ai web UI's pattern:
        // visible-but-quiet, italic, dashed border, never markdown rendered
        // (the content is private reasoning, not a finished reply).
        const [open, setOpen] = useState(false);
        const preview = useMemo(() => {
          const oneLine = (text || "").replace(/\s+/g, " ").trim();
          return oneLine.length > 80 ? oneLine.slice(0, 80) + "…" : oneLine;
        }, [text]);
        return html`<div class="msg-row assistant">
          <div class=${"thinking" + (open ? " open" : "")}>
            <div
              class="thinking-header"
              onClick=${() => setOpen((v) => !v)}
              role="button"
              aria-expanded=${open}
            >
              Thinking${preview ? " · " + preview : ""}
            </div>
            <div class="thinking-body"><pre>${text}</pre></div>
          </div>
        </div>`;
      }

      function InputBar({ agent, disabled, onSend }) {
        const [val, setVal] = useState("");
        const taRef = useRef(null);

        function autoresize() {
          const ta = taRef.current;
          if (!ta) return;
          ta.style.height = "auto";
          ta.style.height = Math.min(200, ta.scrollHeight) + "px";
        }

        function submit() {
          const text = val.trim();
          if (!text || disabled) return;
          onSend(text);
          setVal("");
          requestAnimationFrame(autoresize);
        }

        return html`
          <div class="input-bar">
            <div class="input-shell">
              <button
                class="input-action"
                disabled
                aria-label="Attach (coming soon)"
                title="Attachments — coming soon"
              >
                +
              </button>
              <textarea
                ref=${taRef}
                value=${val}
                disabled=${disabled}
                placeholder=${disabled
                  ? "Wait for current run…"
                  : `Ask ${agentLabel(agent)} anything…`}
                onInput=${(e) => {
                  setVal(e.target.value);
                  autoresize();
                }}
                onKeyDown=${(e) => {
                  if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    submit();
                  }
                }}
                rows="1"
              />
              <button
                class="send-btn"
                disabled=${disabled || !val.trim()}
                onClick=${submit}
              >
                ↑
              </button>
            </div>
          </div>
        `;
      }

      render(html`<${App} />`, document.getElementById("app"));
    </script>
  </body>
</html>
