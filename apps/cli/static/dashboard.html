                  <div class="project-meta">
                    <div class="project-name">Home</div>
                    <div class="project-path">~ (default working directory)</div>
                  </div>
                </div>
                ${pinned.length > 0 &&
                html`<div class="section-label">Pinned</div>`}
                ${pinned.map(
                  (p) => html`<${ProjectRow}
                    key=${p.path}
                    project=${p}
                    onPick=${() => onPick(p.path)}
                    onTogglePin=${() => onTogglePin(p.path)}
                    onRemove=${() => onRemoveProject(p.path)}
                  />`,
                )}
                ${others.length > 0 &&
                html`<div class="section-label">Saved</div>`}
                ${others.map(
                  (p) => html`<${ProjectRow}
                    key=${p.path}
                    project=${p}
                    onPick=${() => onPick(p.path)}
                    onTogglePin=${() => onTogglePin(p.path)}
                    onRemove=${() => onRemoveProject(p.path)}
                  />`,
                )}
                ${grouped.size > 0 &&
                Array.from(grouped.entries()).map(
                  ([parent, items]) => html`
                    <div class="section-label">Discovered · ${parent}</div>
                    ${items.map(
                      (d) => html`<div
                        key=${d.path}
                        class="project-row"
                        onClick=${() => {
                          // Save + immediately start. The user already
                          // gestured towards this folder; no need for a
                          // second confirmation.
                          onAddProject(d.path, d.name);
                          onPick(d.path);
                        }}
                        role="button"
                      >
                        <div class="project-icon">
                          ${d.isGitRepo
                            ? (d.name || "?").trim().slice(0, 1).toUpperCase()
                            : "📁"}
                        </div>
                        <div class="project-meta">
                          <div class="project-name">
                            ${d.name}
                            ${d.isGitRepo &&
                            html`<span class="git-dot" title="git repo"></span>`}
                          </div>
                          <div class="project-path">${parent}/${d.name}</div>
                        </div>
                      </div>`,
                    )}
                  `,
                )}
                <div class="section-label">Custom path</div>
                <div class="modal-custom">
                  <input
                    ref=${inputRef}
                    value=${customPath}
                    placeholder="/Users/you/Documents/GitHub/my-app"
                    autocapitalize="off"
                    autocorrect="off"
                    spellcheck="false"
                    onInput=${(e) => setCustomPath(e.target.value)}
                    onKeyDown=${(e) => e.key === "Enter" && submitCustom()}
                  />
                  <button
                    disabled=${!customPath.trim()}
                    onClick=${submitCustom}
                  >
                    Add & start
                  </button>
                </div>
              </div>
              <div class="modal-footer">
                <button onClick=${onClose}>Cancel</button>
              </div>
            </div>
          </div>
        `;
      }

      function ProjectRow({ project, onPick, onTogglePin, onRemove }) {
        const initial = (project.name || "?").trim().slice(0, 1).toUpperCase();
        // Collapse $HOME to "~" so common paths read shorter on mobile.
        const home = "/Users/" + (location.hostname || "");
        let displayPath = project.path;
        // Best-effort home collapse using a known prefix pattern.
        const homeMatch = displayPath.match(/^\/Users\/[^/]+/);
        if (homeMatch) displayPath = "~" + displayPath.slice(homeMatch[0].length);
        return html`<div
          class="project-row"
          onClick=${onPick}
          role="button"
        >
          <div class="project-icon">${initial}</div>
          <div class="project-meta">
            <div class="project-name">${project.name}</div>
            <div class="project-path">${displayPath}</div>
          </div>
          <div class="project-actions">
            <button
              class=${"project-action" + (project.pinned ? " pinned" : "")}
              onClick=${(e) => {
                e.stopPropagation();
                onTogglePin();
              }}
              aria-label=${project.pinned ? "Unpin" : "Pin"}
              title=${project.pinned ? "Unpin" : "Pin"}
            >
              ${project.pinned ? "★" : "☆"}
            </button>
            <button
              class="project-action"
              onClick=${(e) => {
                e.stopPropagation();
                onRemove();
              }}
              aria-label="Remove"
              title="Remove"
            >
              ✕
            </button>
          </div>
        </div>`;
      }

      function PinScreen({ error, attemptsLeft, busy, onSubmit, onUnpair }) {
        const [val, setVal] = useState("");
        const ref = useRef(null);

        // Auto-focus + auto-clear on error so the user can retype straight away.
        useEffect(() => {
          ref.current?.focus();
        }, []);
        useEffect(() => {
          if (error) {
            setVal("");
            ref.current?.focus();
          }
        }, [error]);

        function submit() {
          const trimmed = val.trim();
          if (trimmed.length >= 4 && !busy) onSubmit(trimmed);
        }

        return html`
          <div class="pin-screen">
            <h2>Enter PIN</h2>
            <p>
              This laptop requires a second factor. Enter the PIN you set with
              <code>pocket-agents --set-pin</code>.
            </p>
            <input
              ref=${ref}
              class=${"pin-input" + (error ? " error" : "")}
              type="password"
              inputmode="numeric"
              autocomplete="off"
              autocorrect="off"
              spellcheck="false"
              maxlength="10"
              value=${val}
              disabled=${busy}
              onInput=${(e) => setVal(e.target.value)}
              onKeyDown=${(e) => e.key === "Enter" && submit()}
            />
            <div class="pin-error">
              ${error
                ? attemptsLeft != null
                  ? `${error} · ${attemptsLeft} attempts left`
                  : error
                : ""}
            </div>
            <button
              data-primary
              onClick=${submit}
              disabled=${busy || val.trim().length < 4}
            >
              ${busy ? "Verifying…" : "Unlock"}
            </button>
            <button data-secondary onClick=${onUnpair}>
              Unpair instead
            </button>
          </div>
        `;
      }

      function PairScreen({ onPair }) {
        const [input, setInput] = useState("");
        function handleSubmit() {
          const t = input.trim();
          if (!t) return;
          onPair(t);
        }
        return html`
          <div class="pair-screen">
            <h2>Pair this device</h2>
            <p
              style="color: var(--muted); text-align: center; margin: 0; max-width: 360px;"
            >
              Paste the pairing token from your laptop, or open the dashboard
              URL with <code>?t=&lt;token&gt;</code>.
            </p>
            <input
              type="password"
              autocapitalize="off"
              autocorrect="off"
              autocomplete="off"
              spellcheck="false"
              value=${input}
              onInput=${(e) => setInput(e.target.value)}
              onKeyDown=${(e) => e.key === "Enter" && handleSubmit()}
              placeholder="paste token here"
            />
            <button onClick=${handleSubmit}>Pair</button>
          </div>
        `;
      }

      function Sidebar({
        sessions,
        sessionsLoaded,
        activeId,
        availableAgents,
        selectedAgent,
        wsState,
        activeWorkspace,
        onCreate,
        onSelectAgent,
        onOpen,
        onRename,
        onDelete,
        onUnpair,
        onChangeWorkspace,
        open,
        onClose,
      }) {
        return html`
          <aside class=${"sidebar" + (open ? " open" : "")}>
            <div class="sidebar-header">
              <div class=${"conn-dot " + wsState}></div>
              <h1>Pocket Agents</h1>
              <button
                class="sidebar-close"
                onClick=${onClose}
                aria-label="Close sidebar"
              >
                ✕
              </button>
            </div>
            <div class="section-label" style="padding: 14px 18px 4px;">Workspace</div>
            <div class="workspace-row" onClick=${onChangeWorkspace}>
              ${activeWorkspace
                ? html`<div class="ws-icon">📁</div>
                    <div class="ws-meta">
                      <div class="ws-name">${activeWorkspace.name}</div>
                      <div class="ws-path">
                        ${shortenPath(activeWorkspace.path)}
                      </div>
                    </div>
                    <span class="ws-action">Change</span>`
                : html`<div class="ws-icon ws-icon-empty">+</div>
                    <div class="ws-meta">
                      <div class="ws-name ws-name-empty">No workspace</div>
                      <div class="ws-path">Tap to connect a folder</div>
                    </div>`}
            </div>
            <div class="agent-picker" role="tablist" aria-label="Agent">
              ${availableAgents.map(
                (agent) => html`
                  <button
                    key=${agent}
                    data-agent=${agent}
                    class=${"agent-option" +
                    (agent === selectedAgent ? " active" : "")}
                    onClick=${() => onSelectAgent(agent)}
                    aria-label=${agentLabel(agent)}
                  >
                    <span class="agent-glyph"></span>${agentLabel(agent)}
                  </button>
                `,
              )}
            </div>
            <button class="new-chat" onClick=${onCreate}>
              New ${agentLabel(selectedAgent)} chat
            </button>
            <div class="sessions">
              ${sessions.length === 0
                ? html`<div class="empty">
                    ${sessionsLoaded
                      ? html`No chats yet.<br />Start a new one above.`
                      : html`Loading chats…`}
                  </div>`
                : html`<div class="sessions-label">Recent</div>
                    ${sessions.map(
                      (s) => html`
                        <div
                          key=${s.id}
                          class=${"session-item" +
                          (s.id === activeId ? " active" : "")}
                          onClick=${() => onOpen(s.id)}
                        >
                          <div style="flex: 1; min-width: 0;">
                            <div class="session-title">
                              <span class="agent-chip" data-agent=${s.agent}>
                                <span class="agent-glyph"></span>${agentLabel(
                                  s.agent,
                                )}
                              </span>
                              <span class="session-text"
                                >${prettyTitle(s)}</span
                              >
                            </div>
                            <div class="session-meta">
                              ${s.messageCount} msgs ·
                              ${timeAgo(s.lastMessageAt)} ago
                            </div>
                          </div>
                          ${(s.status === "running" || s.status === "error") &&
                          html`<div
                            class=${"status-dot " + s.status}
                          ></div>`}
                          <div class="row-actions">
                            <button
                              class="row-action"
                              aria-label="Rename chat"
                              title="Rename"
                              onClick=${(e) => {
                                // stopPropagation so the row's onClick (open
                                // the chat) doesn't also fire.
                                e.stopPropagation();
                                onRename(s.id, prettyTitle(s));
                              }}
                            >
                              ✎
                            </button>
                            <button
                              class="row-action danger"
                              aria-label="Delete chat"
                              title="Delete"
                              onClick=${(e) => {
                                e.stopPropagation();
                                onDelete(s.id, prettyTitle(s));
                              }}
                            >
                              🗑
                            </button>
                          </div>
                        </div>
                      `,
                    )}`}
            </div>
            <div class="sidebar-footer">
              <span>${wsState === "open" ? "Connected" : wsState}</span>
              <button onClick=${onUnpair}>Unpair</button>
            </div>
          </aside>
        `;
      }

      function MainArea({
        chat,
        session,
        projects,
        activeWorkspace,
        wsState,
        wsError,
        selectedAgent,
        availableAgents,
        onSelectAgent,
        onSend,
        onStop,
        onStart,
        onChangeWorkspace,
        onOpenSidebar,
      }) {
        if (!chat) {
          return html`
            <header class="main-header">
              <button
                class="menu-btn"
                onClick=${onOpenSidebar}
                aria-label="Open menu"
              >
                ☰
              </button>
              <div class="header-title">
                <h2>Pocket Agents</h2>
                ${activeWorkspace &&
                html`<span class="header-meta">
                  Working in ${activeWorkspace.name}
                </span>`}
              </div>
              ${activeWorkspace &&
              html`<button
                class="ws-chip"
                onClick=${onChangeWorkspace}
                title="Change workspace"
              >
                📁 ${activeWorkspace.name}
              </button>`}
            </header>
            <${EmptyHero}
              selectedAgent=${selectedAgent}
              availableAgents=${availableAgents}
              activeWorkspace=${activeWorkspace}
              onSelectAgent=${onSelectAgent}
              onStart=${onStart}
              onChangeWorkspace=${onChangeWorkspace}
              wsState=${wsState}
              wsError=${wsError}
            />
          `;
        }

        const currentAgent = session?.agent ?? "claude";

        // Live ticker only ticks while a run is in flight; ditching the
        // interval the moment the run finishes keeps idle tabs silent.
        const running = chat.status === "running";
        const now = useNow(running);
        const elapsedMs =
          running && chat.runStartedAt ? now - chat.runStartedAt : 0;
        const elapsedLabel = running ? formatDuration(elapsedMs) : null;
        const lastDurationLabel =
          !running && chat.lastDurationMs
            ? formatDuration(chat.lastDurationMs)
            : null;

        return html`
          <header class="main-header">
            <button
              class="menu-btn"
              onClick=${onOpenSidebar}
              aria-label="Open menu"
            >
              ☰
            </button>
            <span class="agent-chip" data-agent=${currentAgent}>
              <span class="agent-glyph"></span>${agentLabel(currentAgent)}
            </span>
            <div class="header-title">
              <h2>${prettyTitle(session)}</h2>
              ${session &&
              html`<span class="header-meta">
                ${(() => {
                  const proj = projectLabelFor(session, projects);
                  const time = friendlyTime(session.createdAt);
                  const base = proj ? `${proj} · ${time}` : time;
                  return lastDurationLabel
                    ? `${base} · last run ${lastDurationLabel}`
                    : base;
                })()}
              </span>`}
            </div>
            ${running &&
            html`<span class="badge running"
              >working${elapsedLabel ? ` · ${elapsedLabel}` : ""}</span
            >`}
            ${chat.status === "error" &&
            html`<span class="badge" style="color: var(--error);">error</span>`}
          </header>
          <${MessageList} messages=${chat.messages} status=${chat.status} />
          ${running &&
          html` <div class="status-bar">
            <span class="status-bar-label"
              >${agentLabel(currentAgent)} is working…${elapsedLabel
                ? html` <span class="status-bar-time">${elapsedLabel}</span>`
                : ""}</span
            >
            <button class="stop-btn" onClick=${onStop}>Stop</button>
          </div>`}
          ${session?.cwd &&
          html`<div class="context-pill-row">
            <span class="context-pill">
              📁 ${projectLabelFor(session, projects) ?? basenameOf(session.cwd)} ·
              ${agentLabel(currentAgent)}
            </span>
          </div>`}
          <${InputBar}
            agent=${currentAgent}
            workspaceName=${projectLabelFor(session, projects)}
            disabled=${chat.status === "running"}
            onSend=${onSend}
          />
        `;
      }

      /**
       * Manus-style home: centered headline + composer + suggestion pills.
       * Composer here doesn't talk to a session (none exists yet). On send,
       * it calls onStart(agent, prompt) which (a) creates a fresh session,
       * (b) queues the prompt so it auto-fires once `session.created`
       * arrives. Pills do the same with pre-filled prompts.
       */
      function EmptyHero({
        selectedAgent,
        availableAgents,
        activeWorkspace,
        onSelectAgent,
        onStart,
        onChangeWorkspace,
        wsState,
        wsError,
      }) {
        const [val, setVal] = useState("");
        const taRef = useRef(null);
        const connected = !!activeWorkspace;

        function autoresize() {
          const ta = taRef.current;
          if (!ta) return;
          ta.style.height = "auto";
          ta.style.height = Math.min(180, ta.scrollHeight) + "px";
        }
        function submit() {
          const text = val.trim();
          if (!text) return;
          onStart(selectedAgent, text);
          setVal("");
          requestAnimationFrame(autoresize);
        }

        const subtitle =
          wsState !== "open"
            ? `Connection: ${wsState}${wsError ? " · " + wsError : ""}`
            : connected
              ? `Working in ${activeWorkspace.name}`
              : "Connect a folder to give your agent a workspace.";

        const composerPlaceholder = !connected
          ? "Connect a folder to start…"
          : `Ask ${agentLabel(selectedAgent)} about ${activeWorkspace.name}…`;

        return html`
          <div class="empty-hero">
            <h1>What can I help you build?</h1>
            <p class="hero-sub">${subtitle}</p>

            ${connected
              ? html`<div
                  class="workspace-card workspace-card-connected"
                  onClick=${onChangeWorkspace}
                  role="button"
                  title="Change workspace"
                >
                  <div class="ws-icon">📁</div>
                  <div class="ws-meta">
                    <div class="ws-name">${activeWorkspace.name}</div>
                    <div class="ws-path">
                      ${shortenPath(activeWorkspace.path)}
                    </div>
                  </div>
                  <span class="ws-action">Change</span>
                </div>`
              : html`<div class="workspace-card workspace-card-empty">
                  <div class="ws-card-title">No workspace connected</div>
                  <div class="ws-card-sub">
                    Connect a local folder so ${agentLabel(selectedAgent)} can read
                    files, edit code, and run commands in the right project.
                  </div>
                  <button
                    class="ws-connect-btn"
                    onClick=${onChangeWorkspace}
                  >
                    Connect folder
                  </button>
                </div>`}

            <div class=${"hero-composer" + (!connected ? " disabled" : "")}>
              <button
                class="input-action"
                disabled
                aria-label="Attach (coming soon)"
                title="Attachments — coming soon"
              >
                +
              </button>
              <textarea
                ref=${taRef}
                value=${val}
                placeholder=${composerPlaceholder}
                disabled=${!connected || wsState !== "open"}
                rows="1"
                onInput=${(e) => {
                  setVal(e.target.value);
                  autoresize();
                }}
                onKeyDown=${(e) => {
                  if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    submit();
                  }
                }}
              />
              <button
                class="send-btn"
                disabled=${!val.trim() || !connected || wsState !== "open"}
                onClick=${submit}
                aria-label="Send"
              >
                ↑
              </button>
            </div>

            ${connected &&
            html`<div class="suggestions">
              <button
                class="pill"
                onClick=${() =>
                  onStart(
                    selectedAgent,
                    `Give me a 5-bullet tour of ${activeWorkspace.name}: what it is, main files, tech stack, current state, and what would be a good first task.`,
                  )}
              >
                Explain this repo
              </button>
              <button
                class="pill"
                onClick=${() =>
                  onStart(
                    selectedAgent,
                    `Do a quick code review on the most recently changed files in ${activeWorkspace.name}. Focus on bugs, security issues, and code smells. Be concise.`,
                  )}
              >
                Code review
              </button>
              <button
                class="pill"
                onClick=${() =>
                  onStart(
                    selectedAgent,
                    `Look at the latest git diff in ${activeWorkspace.name} and tell me what changed, what the intent likely was, and any issues.`,
                  )}
              >
                Explain latest diff
              </button>
              <button
                class="pill"
                onClick=${() =>
                  onStart(
                    selectedAgent,
                    `Run the project's test suite in ${activeWorkspace.name} and summarize the results. If there's no test script, suggest a minimal one.`,
                  )}
              >
                Run tests
              </button>
              ${availableAgents.map(
                (a) =>
                  a !== selectedAgent &&
                  html`
                    <button
                      key=${a}
                      class="pill"
                      data-agent=${a}
                      onClick=${() => onSelectAgent(a)}
                    >
                      Switch to ${agentLabel(a)}
                    </button>
                  `,
              )}
            </div>`}
          </div>
        `;
      }

      function MessageList({ messages, status }) {
        const ref = useRef(null);
        useEffect(() => {
          const el = ref.current;
          if (!el) return;
          el.scrollTop = el.scrollHeight;
        }, [messages.length, status]);

        return html`
          <div class="messages" ref=${ref}>
            ${messages.length === 0 && status !== "running"
              ? html`<div class="empty-chat">
                  <h3>New chat</h3>
                  <p>Send a prompt to start the agent.</p>
                </div>`
              : messages.map(
                  (m, i) => html`<${MessageRow} key=${i} msg=${m} />`,
                )}
          </div>
        `;
      }

      function MessageRow({ msg }) {
        if (msg.type === "user") {
          // User input is plain text — render as preformatted so newlines survive,
          // but don't run markdown over it (avoids surprises like `**hi**` getting bolded).
          return html`<div class="msg-row user">
            <div class="bubble user"><pre>${msg.text ?? ""}</pre></div>
          </div>`;
        }
        if (msg.type === "thinking") {
          return html`<${ThinkingBubble} text=${msg.thinking ?? msg.text ?? ""} />`;
        }
        if (msg.type === "redacted_thinking") {
          return html`<div class="msg-row assistant">
            <div class="thinking">
              <span class="thinking-header" style="cursor: default;">
                Thinking · redacted
              </span>
            </div>
          </div>`;
        }
        // Dedicated tool_use row — emitted by the adapter as its own message
        // since 0.4. We still match `msg.tool` defensively for older rows
        // already persisted in SQLite.
        if (msg.type === "tool_use" || (msg.type === "assistant" && msg.tool)) {
          return html` <div class="msg-row assistant">
            <div class="tool-card">
              <div class="tool-label">Tool · ${msg.tool?.name ?? "?"}</div>
              ${msg.tool?.input != null &&
              html`<div class="tool-body">
                <pre>${prettyJson(msg.tool.input)}</pre>
              </div>`}
            </div>
          </div>`;
        }
        if (msg.type === "assistant") {
          // Plain text reply — markdown rendered + sanitized.
          return html` <div class="msg-row assistant">
            <div
              class="bubble assistant md"
              dangerouslySetInnerHTML=${{
                __html: renderMarkdown(msg.text ?? ""),
              }}
            ></div>
          </div>`;
        }
        if (msg.type === "tool_result" || msg.toolResult) {
          const out = msg.toolResult?.output;
          return html` <div class="msg-row assistant">
            <div
              class=${"tool-card" + (msg.toolResult?.isError ? " error" : "")}
            >
              <div class="tool-label">
                Tool result${msg.toolResult?.isError ? " (error)" : ""}
              </div>
              <div class="tool-body">
                <pre>${typeof out === "string" ? out : prettyJson(out)}</pre>
              </div>
            </div>
          </div>`;
        }
        if (msg.type === "hook") {
          // Surface user-configured Claude Code hooks (pre/post tool use,
          // session, etc.). Subtle chip so power users see their hook setup
          // firing, but doesn't dominate the chat.
          return html`<div class="msg-row system">
            <span class="hook-chip">${msg.text ?? "hook"}</span>
          </div>`;
        }
        if (msg.type === "result" || msg.type === "system") {
          return html`<div class="msg-row system">
            <div class="sys-msg">${msg.text ?? msg.type}</div>
          </div>`;
        }
        if (msg.type === "error") {
          return html`<div class="msg-row system">
            <div
              class="sys-msg"
              style="color: var(--error); border-color: var(--error);"
            >
              ${msg.text ?? "error"}
            </div>
          </div>`;
        }
        return null;
      }

      function ThinkingBubble({ text }) {
        // Default state: collapsed. The user can tap the header to see the
        // model's chain-of-thought. We mirror the Claude.ai web UI's pattern:
        // visible-but-quiet, italic, dashed border, never markdown rendered
        // (the content is private reasoning, not a finished reply).
        const [open, setOpen] = useState(false);
        const preview = useMemo(() => {
          const oneLine = (text || "").replace(/\s+/g, " ").trim();
          return oneLine.length > 80 ? oneLine.slice(0, 80) + "…" : oneLine;
        }, [text]);
        return html`<div class="msg-row assistant">
          <div class=${"thinking" + (open ? " open" : "")}>
            <div
              class="thinking-header"
              onClick=${() => setOpen((v) => !v)}
              role="button"
              aria-expanded=${open}
            >
              Thinking${preview ? " · " + preview : ""}
            </div>
            <div class="thinking-body"><pre>${text}</pre></div>
          </div>
        </div>`;
      }

      function InputBar({ agent, workspaceName, disabled, onSend }) {
        const [val, setVal] = useState("");
        const taRef = useRef(null);

        function autoresize() {
          const ta = taRef.current;
          if (!ta) return;
          ta.style.height = "auto";
          ta.style.height = Math.min(200, ta.scrollHeight) + "px";
        }

        function submit() {
          const text = val.trim();
          if (!text || disabled) return;
          onSend(text);
          setVal("");
          requestAnimationFrame(autoresize);
        }

        return html`
          <div class="input-bar">
            <div class="input-shell">
              <button
                class="input-action"
                disabled
                aria-label="Attach (coming soon)"
                title="Attachments — coming soon"
              >
                +
              </button>
              <textarea
                ref=${taRef}
                value=${val}
                disabled=${disabled}
                placeholder=${disabled
                  ? "Wait for current run…"
                  : workspaceName
                    ? `Ask ${agentLabel(agent)} about ${workspaceName}…`
                    : `Ask ${agentLabel(agent)} anything…`}
                onInput=${(e) => {
                  setVal(e.target.value);
                  autoresize();
                }}
                onKeyDown=${(e) => {
                  if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    submit();
                  }
                }}
                rows="1"
              />
              <button
                class="send-btn"
                disabled=${disabled || !val.trim()}
                onClick=${submit}
              >
                ↑
              </button>
            </div>
          </div>
        `;
      }

      render(html`<${App} />`, document.getElementById("app"));
    </script>
  </body>
</html>
